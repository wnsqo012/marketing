function b64ToUint8(b64){ const bin=atob(b64); const len=bin.length; const arr=new Uint8Array(len); for(let i=0;i<len;i++)arr[i]=bin.charCodeAt(i); return arr; }
// 첨부 이미지 바이트 취득: 1)Supabase SDK 다운로드(CORS 안전) 2)실패 시 fetch
async function fetchImageBytes(url){
  try{
    const marker="/public/"+BUCKET+"/";
    const idx=url.indexOf(marker);
    if(idx>=0){ const path=decodeURIComponent(url.slice(idx+marker.length).split("?")[0]);
      const {data,error}=await sb.storage.from(BUCKET).download(path);
      if(!error && data) return await data.arrayBuffer(); }
  }catch(_){}
  const r=await fetch(url); if(!r.ok) throw new Error("http "+r.status);
  return await r.arrayBuffer();
}
// 어떤 포맷이든 PNG dataURL로 변환 + 크기 반환 (blob objectURL이라 canvas 오염 없음)
async function imgToPng(url){
  const bytes=await fetchImageBytes(url);
  const blob=new Blob([bytes]); const objUrl=URL.createObjectURL(blob);
  try{
    const img=await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=()=>rej(new Error("img decode")); im.src=objUrl; });
    const cv=document.createElement("canvas"); cv.width=img.naturalWidth||480; cv.height=img.naturalHeight||360;
    cv.getContext("2d").drawImage(img,0,0);
    return {base64:cv.toDataURL("image/png"), w:cv.width, h:cv.height};
  } finally { URL.revokeObjectURL(objUrl); }
}
const EXP_SHEET_OF={quote:"견적서",tax:"세금계산서",bizreg:"사업자등록증",bankbook:"통장사본"};
async function exportExpenseXlsx(id){
  const e=Store.expensesAll().find(x=>x.id===id); if(!e){ toast("문서를 찾을 수 없습니다"); return; }
  if(!window.EXPENSE_TPL_B64){ toast("엑셀 템플릿을 불러오지 못했습니다"); return; }
  toast("엑셀 생성 중…");
  try{
    const ExcelJS=await loadExcelJS();
    const wb=new ExcelJS.Workbook();
    await wb.xlsx.load(b64ToUint8(window.EXPENSE_TPL_B64).buffer);
    const ws=wb.getWorksheet("지출결의서"); if(!ws) throw new Error("템플릿 시트 없음");
    const set=(addr,v)=>{ try{ ws.getCell(addr).value=v; }catch(_){} };
    if(e.docDate){ const p=e.docDate.split("-").map(Number); set("D7", new Date(p[0],p[1]-1,p[2])); }
    set("D8", e.drafter||""); set("D9", e.dept||""); set("D10", e.reason||"");
    const items=(e.items||[]).slice(0,10);
    for(let i=0;i<10;i++){ const it=items[i];
      set("C"+(12+i), it?(it.desc||""):"");
      set("F"+(12+i), it&&(+it.amount)?(+it.amount):(it?"":null));
      set("M"+(12+i), it?(it.note||""):""); }
    set("C22", e.memo||"");
    set("C27", e.evTax?"O":""); set("D27", e.evCash?"O":""); set("E27", e.evEtc||"");
    set("C29", e.vendor||""); set("D29", e.bank||""); set("E29", e.account||"");
    // 첨부 이미지 → 각 시트에 세로로 삽입
    let imgFail=0, imgCount=0, lastErr="";
    for(const k of Object.keys(EXP_SHEET_OF)){
      const urls=(e.attachments&&e.attachments[k])||[]; if(!urls.length) continue;
      const sh=wb.getWorksheet(EXP_SHEET_OF[k]); if(!sh) continue;
      let rowCursor=1;
      for(const url of urls){
        try{
          const {base64,w,h}=await imgToPng(url);
          const imgId=wb.addImage({base64,extension:"png"});
          const dispW=Math.min(w||520,620); const scale=dispW/(w||dispW); const dispH=Math.round((h||360)*scale);
          sh.addImage(imgId,{tl:{col:0.3,row:(rowCursor-1)+0.2},ext:{width:dispW,height:dispH}});
          rowCursor += Math.ceil(dispH/15)+2; imgCount++;
        }catch(err){ console.warn("이미지 삽입 실패",k,url,err&&err.message); imgFail++; lastErr=(err&&err.message)||"unknown"; }
      }
    }
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const yy=(e.docDate||"").replace(/-/g,"").slice(2)||new Date().toISOString().slice(2,10).replace(/-/g,"");
    const vend=(e.vendor||"상호명").replace(/[\\/:*?"<>|\s]/g,"").slice(0,24)||"상호명";
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`지출결의서_${yy}_${vend}.xlsx`;
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    toast(imgFail?`엑셀 내려받음 · 이미지 ${imgCount}개 삽입, ${imgFail}개 실패${lastErr?" ("+lastErr.slice(0,30)+")":""}`:`엑셀 파일을 내려받았습니다${imgCount?` (이미지 ${imgCount}개 포함)`:""}`);
  }catch(err){ console.error(err); toast("엑셀 생성 실패: "+(err.message||"").slice(0,50)); }
}

function viewContent(){

  if(!CONTENT_OK) return `${ph("콘텐츠 성과","인스타 등 오가닉 게시물 성과를 월별로 입력·집계합니다.")}
    <div class="card"><div class="card-b">${C.empty("📱","기능 준비 필요","supabase_content_metrics.sql 을 Supabase에서 실행한 뒤 새로고침하세요.")}</div></div>`;
  const canWrite = role==="manager"||role==="member"||role==="executive";
  const periods=Store.contentPeriods();
  let cur=session.contentPeriod || periods[0] || new Date().toISOString().slice(0,7);
  const rows=Store.contentAll().filter(m=>m.period===cur).sort((a,b)=>(a.postedAt||0)-(b.postedAt||0));
  const all=contentAgg(rows);
  const reels=rows.filter(r=>r.ctype==="릴스"), cards=rows.filter(r=>r.ctype==="카드뉴스");
  const ra=contentAgg(reels), ca=contentAgg(cards);
  const top=rows.slice().sort((a,b)=>b.views-a.views)[0];
  const periodOpts=[...new Set([...periods,cur])].sort().reverse().map(p=>`<option value="${p}"${p===cur?" selected":""}>${contentPeriodLabel(p)}</option>`).join("");
  const right=`<div class="row" style="gap:8px">
    <select id="c_period" style="padding:7px 10px;border:1px solid var(--line-strong);border-radius:8px;font-size:13px">${periodOpts}</select>
    ${canWrite?`<button class="btn btn-sm" data-act="content-newperiod">＋ 기간</button><button class="btn btn-primary btn-sm" data-act="content-add">＋ 게시물 추가</button>`:""}</div>`;
  const kcard=(v,l)=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  const summary=rows.length?`
    <div class="cmet-kpis">
      ${kcard(all.views.toLocaleString(),"총 조회")}${kcard(all.reach.toLocaleString(),"총 도달")}
      ${kcard("+"+all.follows,"신규 팔로우")}${kcard(all.saves,"저장")}${kcard(all.likes+" / "+all.shares,"좋아요 / 공유")}
    </div>
    <div class="card" style="margin-bottom:16px"><div class="card-h"><h3>유형별 집계</h3></div><div class="card-b" style="overflow-x:auto">
      <table class="ctab"><thead><tr><th>유형</th><th>건수</th><th>총 조회</th><th>총 도달</th><th>팔로우</th><th>저장</th><th>게시물당 평균 조회</th></tr></thead><tbody>
      ${[["릴스",ra],["카드뉴스",ca]].map(([t,a])=>a.count?`<tr><td><b>${t}</b></td><td>${a.count}</td><td>${a.views.toLocaleString()}</td><td>${a.reach.toLocaleString()}</td><td>${a.follows}</td><td>${a.saves}</td><td><b>${a.count?Math.round(a.views/a.count).toLocaleString():0}</b></td></tr>`:"").join("")}
      <tr class="tot"><td>합계</td><td>${all.count}</td><td>${all.views.toLocaleString()}</td><td>${all.reach.toLocaleString()}</td><td>${all.follows}</td><td>${all.saves}</td><td>${all.count?Math.round(all.views/all.count).toLocaleString():0}</td></tr>
      </tbody></table>
      ${(ra.count&&ca.count)?`<div class="hint" style="margin-top:10px">📌 릴스 게시물당 평균 조회가 카드뉴스의 <b>${(ra.views/ra.count/(ca.views/ca.count||1)).toFixed(1)}배</b>${top?` · 최고 성과: ${fmtDate(top.postedAt)} ${esc(top.ctype)} (조회 ${top.views.toLocaleString()})`:""}</div>`:""}
    </div></div>`
    :C.empty("📱","이 기간에 입력된 게시물이 없습니다","‘＋ 게시물 추가’로 성과를 입력하세요.");
  const table=rows.length?`<div class="card"><div class="card-h"><h3>게시물 목록 (${rows.length})</h3></div><div class="card-b" style="overflow-x:auto">
    <table class="ctab"><thead><tr><th>게시일</th><th>유형</th><th>조회</th><th>도달</th><th>좋아요</th><th>공유</th><th>팔로우</th><th>댓글</th><th>저장</th><th>링크</th>${canWrite?"<th></th>":""}</tr></thead><tbody>
    ${rows.map(m=>`<tr>
      <td style="white-space:nowrap">${m.postedAt?fmtDT(m.postedAt):"-"}</td><td>${esc(m.ctype)}</td>
      <td>${m.views.toLocaleString()}</td><td>${m.reach.toLocaleString()}</td><td>${m.likes}</td><td>${m.shares}</td><td>${m.follows}</td><td>${m.comments}</td><td>${m.saves}</td>
      <td>${m.link?`<a href="${esc(m.link)}" target="_blank" rel="noopener" style="color:var(--primary)">열기</a>`:"-"}</td>
      ${canWrite?`<td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" data-act="content-edit" data-id="${m.id}" style="padding:2px 7px;font-size:11px">수정</button> <button class="btn btn-ghost btn-sm" data-act="content-del" data-id="${m.id}" style="padding:2px 7px;font-size:11px">삭제</button></td>`:""}
    </tr>`).join("")}
    </tbody></table></div></div>`:"";
  return `${ph("콘텐츠 성과",`${contentPeriodLabel(cur)} · 오가닉 게시물 성과`,right)}${summary}${table}`;
}
function openContentModal(preset){

  const p=preset||null;
  const cur=session.contentPeriod || Store.contentPeriods()[0] || new Date().toISOString().slice(0,7);
  const dtVal=p&&p.postedAt?new Date(p.postedAt-new Date(p.postedAt).getTimezoneOffset()*60000).toISOString().slice(0,16):`${cur}-01T09:00`;
  const num=(id,lab,v)=>`<label class="fld"><span class="lab">${lab}</span><input type="number" id="${id}" min="0" value="${v!=null?v:0}"></label>`;
  Modal.open({title:p?"게시물 성과 수정":"게시물 성과 추가",okLabel:p?"저장":"추가",body:`
    <div class="grid g2" style="gap:0 16px">

    </div>
    <label class="fld"><span class="lab">게시물 링크 <span class="hint">선택</span></span><input type="url" id="c_link" placeholder="https://www.instagram.com/..." value="${p?esc(p.link):""}"></label>
    <div class="grid g2" style="gap:0 16px">
      ${num("c_views","조회",p&&p.views)}${num("c_reach","도달",p&&p.reach)}
      ${num("c_likes","좋아요",p&&p.likes)}${num("c_shares","공유",p&&p.shares)}
      ${num("c_follows","팔로우",p&&p.follows)}${num("c_comments","댓글",p&&p.comments)}

      if(p){ const patch={ctype:rec.ctype,posted_at:postedAt?iso(postedAt):null,link:rec.link||null,views:rec.views,reach:rec.reach,likes:rec.likes,shares:rec.shares,follows:rec.follows,comments:rec.comments,saves:rec.saves};
        if(await Store.updateContent(p.id,patch,m=>Object.assign(m,rec))){ toast("수정되었습니다"); render(); } else return false;
      } else { const m={id:Store.uid(),period:cur,...rec,memo:"",createdBy:me().id,createdAt:Date.now()};
        if(await Store.addContent(m)){ toast("추가되었습니다"); render(); } else return false; }
    }});
}

function adGuessPlatform(name){ const s=(name||"").toLowerCase();
  if(/meta|facebook|fb|insta/.test(s))return "meta"; if(/google|gads|adwords/.test(s))return "google";
  if(/naver/.test(s))return "naver"; if(/kakao|moment/.test(s))return "kakao"; return "meta"; }
function adNormHead(s){ return String(s).toLowerCase().replace(/[\s._\-()\[\]\/]/g,"").replace(/₩|\$|krw|won|원/g,""); }
const AD_ALIASES={
  date:["date","day","날짜","일자","집행일","노출일","reportingstarts","기간","일"],
  campaign:["campaign","campaignname","캠페인","캠페인명","캠페인이름","광고그룹명","광고그룹","adgroup","adgroupname","그룹명"],
  spend:["spend","amountspent","cost","spent","비용","광고비","지출","총비용","소진금액","과금","집행금액","광고비용"],
  impressions:["impressions","impr","imps","노출","노출수","노출횟수"],
  clicks:["clicks","linkclicks","click","클릭","클릭수","유효클릭","링크클릭"],
  conversions:["conversions","conversion","results","전환","전환수","전환건수","구매","구매수","purchases","결과"],
  revenue:["revenue","conversionvalue","purchaseconversionvalue","전환매출","전환매출액","전환가치","매출","매출액","구매전환값","수익"],
};
function adAutoMap(heads){
  const fields=Object.keys(AD_ALIASES); const cand=[];
  heads.forEach(h=>{ const nh=adNormHead(h);
    fields.forEach(fld=>{ let sc=0;
      AD_ALIASES[fld].forEach(al=>{ const na=adNormHead(al); if(!na)return;
        if(nh===na)sc=Math.max(sc,1000); else if(nh.includes(na))sc=Math.max(sc,na.length); });
      if(sc>0)cand.push({h,fld,sc}); }); });
  cand.sort((a,b)=>b.sc-a.sc);
  const map={},usedH={},usedF={};
  cand.forEach(c=>{ if(usedH[c.h]||usedF[c.fld])return; map[c.fld]=c.h; usedH[c.h]=1; usedF[c.fld]=1; });
  return map;
}
function parseCSV(text){ text=text.replace(/^\uFEFF/,""); const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"')q=true; else if(c===","){row.push(cur);cur="";} else if(c==="\n"){row.push(cur);rows.push(row);row=[];cur="";} else if(c==="\r"){} else cur+=c; } }
  if(cur.length||row.length){ row.push(cur); rows.push(row); }
  const clean=rows.filter(r=>r.some(c=>String(c).trim()!=="")); if(!clean.length)return {headers:[],rows:[]};
  const headers=clean[0].map(h=>String(h).trim());
  const data=clean.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]!==undefined?r[i]:"");return o;});
  return {headers,rows:data}; }
function loadSheetJS(){ return new Promise((res,rej)=>{ if(window.XLSX)return res(window.XLSX);
  const s=document.createElement("script"); s.src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js";
  s.onload=()=>res(window.XLSX); s.onerror=()=>rej(new Error("xlsx load fail")); document.head.appendChild(s); }); }
async function parseXLSX(file){ const XLSX=await loadSheetJS(); const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:"array"}); const ws=wb.Sheets[wb.SheetNames[0]];
  const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:""}); const clean=arr.filter(r=>r.some(c=>String(c).trim()!==""));
  if(!clean.length)return {headers:[],rows:[]}; const headers=clean[0].map(h=>String(h).trim());
  const rows=clean.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]!==undefined?r[i]:"");return o;}); return {headers,rows}; }
function openAdUpload(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".csv,.xlsx,.xls,text/csv";
  inp.onchange=async()=>{ const file=inp.files&&inp.files[0]; if(!file)return;
    try{ let parsed;
      if(/\.xlsx?$/i.test(file.name)){ toast("엑셀 파일 읽는 중…"); parsed=await parseXLSX(file); }
      else parsed=parseCSV(await file.text());
      if(!parsed.headers.length||!parsed.rows.length){ toast("데이터를 읽지 못했습니다. 파일을 확인하세요."); return; }
      openAdMapping(parsed,file.name);
    }catch(e){ console.error(e); toast("파일을 읽는 중 오류가 발생했습니다. (엑셀은 인터넷 연결 필요 — CSV 권장)"); } };

function bucketRefPaths(){

  const fromUrl=u=>{ if(!u)return null; const p=String(u).split("/object/public/"+BUCKET+"/")[1]; return p?decodeURIComponent(p.split("?")[0]):null; };

async function scanOrphans(){
  ORPHAN.status="scanning"; render();
  try{
    const all=[]; let offset=0; const LIMIT=1000;
    while(true){
      const {data,error}=await sb.storage.from(BUCKET).list("",{limit:LIMIT,offset,sortBy:{column:"created_at",order:"asc"}});
      if(error) throw error;
      if(!data||!data.length) break;
      data.forEach(o=>{ if(o.name && !o.name.startsWith(".")) all.push({name:o.name,size:(o.metadata&&o.metadata.size)||0,created:o.created_at?Date.parse(o.created_at):0}); });
      if(data.length<LIMIT) break; offset+=LIMIT;
    }
    const ref=bucketRefPaths();
    const cutoff=Date.now()-60*60*1000;   // 최근 1시간 업로드는 보호(업로드 진행 중일 수 있음)
    const orphans=all.filter(o=>!ref.has(o.name) && !(o.created && o.created>cutoff));
    ORPHAN.all=all; ORPHAN.orphans=orphans; ORPHAN.refCount=ref.size; ORPHAN.totalCount=all.length;
    ORPHAN.reclaim=orphans.reduce((s,o)=>s+(o.size||0),0); ORPHAN.status="done";
  }catch(e){ console.error(e); toast("스캔 실패: "+((e&&e.message)||"").slice(0,60)); ORPHAN.status="idle"; }
  render();
}
async function deleteOrphans(names){
  if(!names.length) return;
  let done=0, blocked=false;
  for(let i=0;i<names.length;i+=100){
    const chunk=names.slice(i,i+100);
    const {data,error}=await sb.storage.from(BUCKET).remove(chunk);
    if(error){ console.error(error); toast("삭제 실패: "+error.message.slice(0,55)); break; }
    const removed=(data||[]).length;   // 실제 삭제된 객체 수 (RLS로 막히면 0건)
    done+=removed;
    if(removed<chunk.length) blocked=true;
  }
  if(done===0 && blocked) toast("삭제되지 않았습니다 — 스토리지 삭제 정책(supabase_storage_delete.sql)을 실행했는지 확인하세요");
  else if(blocked) toast(`${done}개만 삭제됨 — 일부는 삭제 권한(정책)으로 차단된 것 같습니다`);
  else if(done) toast(`${done}개 삭제했습니다`);
  await scanOrphans();
}

function mts(dateStr){ const p=(dateStr||"").split("-").map(Number); return p.length===3?new Date(p[0],p[1]-1,p[2]).getTime():Date.parse(dateStr); }
function mDispDT(m){ return mdisp(m.date)+(m.time?` ${m.time}`:""); }
function mtsFull(m){ const base=mts(m.date); if(!m.time) return base; const [h,mi]=m.time.split(":").map(Number); return base+((h||0)*3600000+(mi||0)*60000); }
function meetingHistoryTimeline(done){
  const g=session.mgantt;
  const toolbar=`<div class="g-toolbar">
    <div class="g-seg">${[["week","주"],["month","월"],["quarter","분기"],["all","전체"]].map(([k,l])=>`<button data-act="g-range" data-gt="m" data-range="${k}" class="${g.range===k?"on":""}">${l}</button>`).join("")}</div>
    ${g.range!=="all"?`<span class="g-nav"><button data-act="g-nav" data-gt="m" data-dir="-1">‹</button><b>${ganttLabel(ganttWindow(g),g)}</b><button data-act="g-nav" data-gt="m" data-dir="1">›</button></span>`:`<span class="g-nav"><b>전체 기간</b></span>`}
    <select class="g-sel" id="mg_group"><option value="none" ${g.group==="none"?"selected":""}>그룹: 없음</option><option value="owner" ${g.group==="owner"?"selected":""}>그룹: 작성자별</option></select>
    <span style="flex:1"></span><span class="tag">완료 ${done.length}건</span></div>`;
  const headWrap=html=>`<div class="card"><div class="card-h"><h3>완료된 회의 (히스토리)</h3></div><div class="card-b">${toolbar}${html}</div></div>`;
  if(!done.length) return headWrap(`<div class="hint">완료된 회의가 아직 없습니다.</div>`);
  const day=86400000;
  let win=ganttWindow(g);
  if(!win){ const ds=done.map(m=>mts(m.date)); win={start:Math.min(...ds),end:Math.max(...ds)+day,range:"all",ticks:"month"}; }
  const span=Math.max(day,win.end-win.start);
  const inWin=done.filter(m=>{ const t=mts(m.date); return t>=win.start && t<win.end; }).sort((a,b)=>mts(a.date)-mts(b.date));
  const today=(()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();})();
  const todayPct=(today>=win.start&&today<win.end)?((today-win.start)/span)*100:null;
  const ticks=ganttTicks(win);
  const tickEls=ticks.map(tk=>`<div class="tick" style="left:${tk.pct}%"></div>`).join("");
  const rowHtml=m=>{ const t=mts(m.date), pct=((t-win.start)/span)*100;
    return `<div class="g-row"><div class="lbl" data-act="open-meeting" data-id="${m.id}"><div class="t">${esc(m.title||m.agenda.split("\n")[0].slice(0,40))}</div><div class="s">${esc(Store.user(m.createdBy)?.name||'')}</div></div>
      <div class="g-track">${tickEls}${todayPct!=null?`<div class="g-today" style="left:${todayPct}%"></div>`:""}
        <div class="mg-pill" data-act="open-meeting" data-id="${m.id}" style="left:${Math.max(2,Math.min(98,pct))}%" title="${esc(m.title||'')} · ${mDispDT(m)}">${mdisp(m.date).slice(5)}${m.time?` ${m.time}`:""}</div></div></div>`; };
  const groups={}; (g.group==="owner"?inWin:inWin).forEach(m=>{ const k=g.group==="owner"?(Store.user(m.createdBy)?.name||"미지정"):""; (groups[k]=groups[k]||[]).push(m); });
  const head2=`<div class="g-head"><div class="lbl">회의</div><div class="scale" style="position:relative;flex:1;height:14px">${ticks.map(tk=>`<span style="position:absolute;left:${tk.pct}%;transform:translateX(2px)">${tk.label}</span>`).join("")}</div></div>`;
  const body=inWin.length?Object.keys(groups).sort().map(k=>`${g.group!=="none"?`<div class="g-grp">${esc(k)} <span style="font-weight:500;opacity:.7">${groups[k].length}</span></div>`:""}${groups[k].map(rowHtml).join("")}`).join(""):`<div class="g-empty-range">이 기간에 완료된 회의가 없습니다. 기간을 넓히거나 이동해 보세요.</div>`;
  return headWrap(`<div class="gantt-wrap"><div class="gantt">${head2}${body}</div></div>`);
}

function wireAssetReorder(){
  const list=document.getElementById("asset-list"); if(!list) return;
  let dragId=null;
  list.querySelectorAll(".asset-drag").forEach(h=>{
    h.addEventListener("dragstart",e=>{ dragId=h.dataset.id; e.dataTransfer.effectAllowed="move"; const card=h.closest(".arow"); if(card) card.classList.add("dragging"); });
    h.addEventListener("dragend",()=>{ dragId=null; list.querySelectorAll(".arow").forEach(c=>c.classList.remove("dragging","dragover")); });
  });
  list.querySelectorAll('.arow[data-sortable]').forEach(card=>{
    card.addEventListener("dragover",e=>{ if(!dragId)return; e.preventDefault(); card.classList.add("dragover"); });
    card.addEventListener("dragleave",()=>card.classList.remove("dragover"));
    card.addEventListener("drop",async e=>{ e.preventDefault(); card.classList.remove("dragover");
      const targetId=card.dataset.asset; if(!dragId||dragId===targetId) return;
      await reorderAssets(list.dataset.task, dragId, targetId);
    });
  });
}
async function reorderAssets(taskId, dragId, targetId){
  const order=Store.assetsOf(taskId).map(a=>a.id);
  const from=order.indexOf(dragId), to=order.indexOf(targetId);
  if(from<0||to<0) return;
  order.splice(to,0,order.splice(from,1)[0]);          // dragId를 target 자리로 이동
  let okAll=true;
  for(let i=0;i<order.length;i++){ const a=Store.db.assets.find(x=>x.id===order[i]); if(!a||a.sortNo===i) continue;
    const ok=await Store.update("assets",a.id,{sort_no:i},()=>{a.sortNo=i;}); if(!ok) okAll=false; }
  // 아직 sort_no가 없던 항목까지 모두 인덱스 부여(혼합 방지)
  for(let i=0;i<order.length;i++){ const a=Store.db.assets.find(x=>x.id===order[i]); if(a&&a.sortNo==null){ const ok=await Store.update("assets",a.id,{sort_no:i},()=>{a.sortNo=i;}); if(!ok) okAll=false; } }
  if(!okAll) toast("일부 순서 저장에 실패했습니다 — supabase_asset_sort.sql 실행 여부를 확인하세요");
  else toast("순서를 변경했습니다");
  render();
}

const NOTIF_LABEL={task_created:"새 업무",task_created_me:"내 업무 등록",review_requested:"검토 요청",review_resubmitted:"재검토 요청",review_submitted:"검토 요청 접수",review_resubmitted_me:"재검토 접수",approved:"승인됨",rejected:"반려됨",exec_decision:"대표 결정",post_created:"새 공지·글",comment_added:"새 댓글",due_soon:"마감 임박",overdue:"마감 초과",meeting_invited:"회의 참석 요청",coreview_requested:"검수 요청",coreview_done:"검수 완료"};
function notifBodyText(r){ if(r.type==="meeting_invited") return r.message||"회의에 참석자로 지정되었습니다"; if(r.type==="coreview_requested"||r.type==="coreview_done") return r.message||"공동검수 알림"; const t=r.task_id?Store.task(r.task_id):null;
  return (t?`[${t.title}] `:"")+(r.type==="approved"?"승인되었습니다":r.type==="rejected"?"반려되었습니다":(r.type==="review_requested"||r.type==="review_resubmitted")?"검토가 필요합니다":r.type==="comment_added"?"새 댓글이 있습니다":r.type==="post_created"?"새 글이 등록되었습니다":r.type==="task_created"?"새 업무가 등록되었습니다":"확인해 주세요"); }
// ===== 인앱 알림센터 (권한 불필요) =====
const InApp={
  key(){ return "notifSeen:"+(me()?me().id:"x"); },
  lastSeen(){ try{ return +localStorage.getItem(this.key())||0; }catch(e){ return 0; } },
  markRead(){ try{ localStorage.setItem(this.key(), String(Date.now())); }catch(e){} updateNotifChrome(); },
  soundOn(){ try{ return localStorage.getItem("notifSound")!=="0"; }catch(e){ return true; } },
  setSound(v){ try{ localStorage.setItem("notifSound", v?"1":"0"); }catch(e){} },
  mine(){ return Store.notifsAll().filter(n=>n.recipientId===me().id && (n.channel==="email"||!n.channel)); }, // 이벤트당 1건
  unread(){ const ls=this.lastSeen(); return this.mine().filter(n=>n.sentAt>ls).length; },
  beep(){ if(!this.soundOn()) return; try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return; const c=new AC(); const now=c.currentTime;
      const tone=(freq,start,dur,peak)=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination); o.type="triangle"; o.frequency.value=freq; g.gain.setValueAtTime(.0001,now+start); g.gain.exponentialRampToValueAtTime(peak,now+start+.02); g.gain.exponentialRampToValueAtTime(.0001,now+start+dur); o.start(now+start); o.stop(now+start+dur+.02); };
      tone(880,0,.30,.6); tone(1174,.16,.36,.6);   // 띵-동 (두 음, 크게)
      setTimeout(()=>{try{c.close();}catch(e){}},1000); }catch(e){} }
};
function updateNotifChrome(){
  const badge=document.getElementById("notifBadge"); const n=me()?InApp.unread():0;
  if(badge){ if(n>0){ badge.textContent=n>99?"99+":String(n); badge.style.display=""; } else badge.style.display="none"; }
  try{ document.title=(n>0?`(${n}) `:"")+"마케팅 운영 플랫폼"; }catch(e){}
}
function toggleNotifPanel(){ const p=document.getElementById("notifPanel"); if(!p) return;
  if(p.style.display==="none"){ renderNotifPanel(); p.style.display="block"; InApp.markRead(); }

function renderNotifPanel(){ const p=document.getElementById("notifPanel"); if(!p) return;
  const list=InApp.mine().slice(0,30); const ls=InApp.lastSeen();
  const rows=list.length?list.map(n=>{ const isNew=n.sentAt>ls;
    return `<div class="nrow${isNew?" new":""}" data-act="open-notif" data-id="${n.id}" data-task="${n.taskId||""}" data-ntype="${n.type||""}">
      <div class="nrow-t">${esc(NOTIF_LABEL[n.type]||"알림")}</div>

  const sc=document.getElementById("np_sound"); if(sc) sc.onchange=()=>{ InApp.setSound(sc.checked); if(sc.checked) InApp.beep(); };
}
const PCNotify={
  supported(){ return typeof Notification!=="undefined"; },
  granted(){ return this.supported() && Notification.permission==="granted"; },
  show(title, body, taskId){ if(!this.granted()) return;
    try{ const n=new Notification(title,{body:body||"",tag:taskId||undefined});
      n.onclick=()=>{ try{ window.focus(); }catch(e){} if(taskId){ session.route={view:"task",id:taskId}; render(); } n.close(); };
      setTimeout(()=>{ try{n.close();}catch(e){} }, 12000);
    }catch(e){}
  }
};
let rtChannel=null, rtTimer=null;
function startRealtime(){
  if(!sb||rtChannel) return;
  try{
    rtChannel=sb.channel("ops-realtime")
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"}, ()=>scheduleRealtimeRefresh())
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"notification_logs"}, payload=>{
        const r=payload&&payload.new; if(!r||!session.user) return;
        if(r.recipient_id!==me().id) return;          // 본인 수신분만
        if(r.channel && r.channel!=="email") return;  // 이벤트당 1회(email 로그 기준)
        if(!Store.db.notifs.some(x=>x.id===r.id)){ try{ Store.db.notifs.push(Maps.notif.from(r)); }catch(e){} }  // 즉시 반영
        InApp.beep();                                  // 소리(권한 불필요)
        updateNotifChrome();                           // 배지·탭제목 갱신
        PCNotify.show(NOTIF_LABEL[r.type]||"새 알림", notifBodyText(r), r.task_id||null); // OS 팝업(허용 시 보너스)
        const p=document.getElementById("notifPanel"); if(p&&p.style.display!=="none") renderNotifPanel();
        scheduleRealtimeRefresh();
      })
      .subscribe();
  }catch(e){ console.warn("realtime 비활성:",e); }
}
function stopRealtime(){ if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} rtChannel=null; } }
function scheduleRealtimeRefresh(){ clearTimeout(rtTimer); rtTimer=setTimeout(async()=>{
  if(!session.user) return;
  try{
    await Store.refreshTasks();
    const modalOpen=document.getElementById("mwrap").classList.contains("open");
    const ae=document.activeElement, typing=ae && (ae.tagName==="INPUT"||ae.tagName==="TEXTAREA"||ae.isContentEditable);
    if(!modalOpen && !typing) render();   // 모달 열림/입력 중에는 다시 그리지 않음 — 작성 내용 보호
  }
  catch(e){ console.error("realtime refresh:",e); }
}, 350); }

const VIEWER_ALLOWED=new Set(["goto","open-task","open-post","open-meeting","open-notif","clear-filter","zoom","zoom-cardnews","doc-view","download-asset","g-range","g-nav"]);
const PARTNER_ALLOWED=new Set(["goto"]);   // 파트너: 생성기 외 동작 차단(메뉴 이동만)

  // 파트너 계정: 생성기 전용 — goto(메뉴 이동) 외 모든 동작 차단

function openCardnews(assetId){ // 카드뉴스 묶음만 좌우/키보드로 탐색
  const a=Store.db.assets.find(x=>x.id===assetId); if(!a||!a.pages||!a.pages.length) return;
  gallery=a.pages.map((p,i)=>({src:p.fileData,kind:"image",name:p.fileName||("card-"+(i+1))}));

function openGallery(el){ // 현재 화면의 모든 이미지/영상을 모아 탐색
  const nodes=[...document.querySelectorAll('[data-act="zoom"]')], seen=new Set(); gallery=[];
  nodes.forEach(n=>{ const s=n.dataset.src; if(s&&!seen.has(s)){ seen.add(s); gallery.push({src:s,kind:n.dataset.kind||"image",name:n.dataset.name||"file"}); }});
  galleryIdx=Math.max(0,gallery.findIndex(g=>g.src===el.dataset.src));
  if(!gallery.length){ openLightbox(el.dataset.src,el.dataset.kind||"image",el.dataset.name||""); return; }
  showGallery();

function showGallery(){
  const g=gallery[galleryIdx]; if(!g)return;

    ? `<video src="${g.src}" controls autoplay playsinline></video>` : `<img src="${g.src}" alt="">`;
  document.getElementById("lbDl").style.display=["manager","executive"].includes(me()?.role)?"block":"none";
  document.getElementById("lbCount").textContent = gallery.length>1?`${galleryIdx+1} / ${gallery.length}`:"";
  const lb=document.getElementById("lightbox"); lb.classList.toggle("multi",gallery.length>1); lb.classList.add("open");
}
function galleryStep(d){ if(gallery.length<2)return; galleryIdx=(galleryIdx+d+gallery.length)%gallery.length; showGallery(); }

  if(!window.supabase||!window.supabase.createClient){ err.textContent="Supabase 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인하고 새로고침하세요."; err.classList.add("show"); return; }

  try{
    sb=window.supabase.createClient(SUPA.url,SUPA.key,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});
  }catch(e){ console.error(e); err.textContent="Supabase 초기화 실패: "+((e&&e.message)||e); err.classList.add("show"); return; }
  sb.auth.getSession().then(({data})=>{ if(data&&data.session){ afterAuth(); } else { document.getElementById("loginId").focus(); } })
    .catch(e=>{ console.error(e); document.getElementById("loginId").focus(); });
})();
</script>
