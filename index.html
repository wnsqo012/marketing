<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>마케팅 운영 플랫폼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#eef0f3; --surface:#fff; --surface-2:#f6f7f9; --surface-3:#fafbfc;
    --ink:#1c1f26; --ink-soft:#4a4f5a; --muted:#878d99; --faint:#aeb4be;
    --line:#e6e8ec; --line-strong:#d3d8df;
    --primary:#27474f; --primary-ink:#16292e; --primary-soft:#e7eeed;
    --brass:#b07d2e; --brass-soft:#f3e9d4;
    --s-plan:#7a8aa0; --s-plan-bg:#eaeef3;
    --s-prod:#5b7fb0; --s-prod-bg:#e6eefa;
    --s-mgr:#b07d2e;  --s-mgr-bg:#f7eed9;
    --s-exec:#a25fb0; --s-exec-bg:#f3e6f6;
    --s-appr:#2f7d5b; --s-appr-bg:#dff0e7;
    --s-exec2:#3a8a7a;--s-exec2-bg:#ddf0eb;
    --s-done:#4a4f5a; --s-done-bg:#e6e8ec;
    --warn:#c1573f; --warn-bg:#f8e3dc; --ok:#2f7d5b; --ok-bg:#dff0e7;
    --vac:#7c6bb0; --vac-bg:#ece7f6;
    --radius:13px; --shadow:0 1px 2px rgba(20,24,30,.04),0 6px 20px -14px rgba(20,24,30,.3);
    --shadow-lg:0 24px 60px -20px rgba(20,24,30,.4);
    --fd:"Fraunces",Georgia,serif; --fu:"Inter",system-ui,sans-serif; --fm:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--fu);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.5;font-size:14px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  a{color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:6px;border:3px solid var(--bg)}

  /* login */
  .login{min-height:100vh;min-height:100svh;min-height:100dvh;display:grid;place-items:center;padding:24px;background:radial-gradient(120% 80% at 50% -10%,#2f535b,#27474f 42%,#16292e)}
  .login-card{background:var(--surface);width:min(380px,100%);border-radius:18px;box-shadow:var(--shadow-lg);overflow:hidden}
  .login-head{padding:26px 28px 20px;border-bottom:1px solid var(--line)}
  .login-head .mk{font-family:var(--fm);font-size:11px;letter-spacing:.18em;color:var(--brass);text-transform:uppercase}
  .login-head h1{font-family:var(--fd);font-weight:500;font-size:23px;margin:8px 0 2px}
  .login-head p{margin:0;color:var(--muted);font-size:12.5px}
  .login-body{padding:22px 28px 26px}
  .login-err{display:none;background:var(--warn-bg);color:var(--warn);font-size:12.5px;padding:9px 12px;border-radius:9px;margin-bottom:14px;font-weight:500}
  .login-err.show{display:block}
  .login-foot{margin-top:16px;border-top:1px dashed var(--line);padding-top:12px}
  .login-foot summary{cursor:pointer;font-size:11.5px;color:var(--muted);font-family:var(--fm)}
  .login-foot table{width:100%;border-collapse:collapse;margin-top:10px;font-size:11.5px}
  .login-foot td{padding:3px 6px;border-bottom:1px solid var(--line);color:var(--ink-soft)}
  .login-foot td.k{font-family:var(--fm);color:var(--ink)}

  /* shell */
  .bar{position:sticky;top:0;z-index:30;background:var(--primary);color:#eef2f1;border-bottom:1px solid rgba(0,0,0,.2)}
  .bar-in{display:flex;align-items:center;gap:14px;padding:11px 20px}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand .mk{font-family:var(--fm);font-size:10.5px;letter-spacing:.16em;color:#9fc0bd;text-transform:uppercase}
  .brand h1{font-family:var(--fd);font-weight:500;font-size:17px;margin:0;color:#fff}
  .spacer{flex:1}
  .who{font-size:12px;color:#bcd2cf}.who b{color:#fff;font-weight:600}
  .ai-flag{font-family:var(--fm);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.25);color:#cfe0de}
  .ai-flag.live{background:var(--brass);border-color:var(--brass);color:#fff}
  .hbtn{appearance:none;border:1px solid rgba(255,255,255,.25);background:transparent;color:#cfe0de;font-size:11.5px;padding:6px 11px;border-radius:8px;cursor:pointer;font-family:var(--fm)}
  .cmet-kpis{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .cal-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .cal-nav{display:flex;align-items:center;gap:4px}
  .cal-legend{display:flex;gap:14px;font-size:11.5px;color:var(--ink-soft)}
  .cal-legend span{display:inline-flex;align-items:center;gap:5px}
  .cal-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .cal-grid{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .cal-head{display:flex;background:var(--surface-2);border-bottom:1px solid var(--line)}
  .cal-head>div{flex:1;text-align:center;font-size:11.5px;font-weight:700;padding:7px 0}
  .cal-week{position:relative;border-bottom:1px solid var(--line);min-height:66px}
  .cal-week:last-child{border-bottom:0}
  .cal-cell{position:absolute;top:0;bottom:0;border-right:1px solid var(--line);box-sizing:border-box;padding:3px}
  .cal-cell:last-child{border-right:0}
  .cal-cell.out{background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(0,0,0,.015) 6px,rgba(0,0,0,.015) 12px)}
  .cal-num{font-size:11.5px;font-weight:600;line-height:18px;min-width:18px;height:18px;display:inline-block;text-align:center;border-radius:50%}
  .cal-bar{position:absolute;height:17px;line-height:17px;border-radius:4px;color:#fff;font-size:10.5px;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .cal-bar[data-act]{cursor:pointer}
  .xls-wrap{overflow-x:auto;padding:2px}
  .xls-appr{display:flex;justify-content:flex-end;gap:0;margin-bottom:6px}
  .xls-appr .abox{border:1px solid #7a7a7a;border-left:0;min-width:66px;text-align:center;font-size:10.5px;font-family:'Malgun Gothic',sans-serif}
  .xls-appr .abox:first-child{border-left:1px solid #7a7a7a}
  .xls-appr .abox .h{background:#FFF2CC;border-bottom:1px solid #7a7a7a;padding:3px 2px;font-weight:600}
  .xls-appr .abox .b{height:32px;padding:3px 2px;display:flex;align-items:center;justify-content:center}
  .xls-title{text-align:center;font-size:25px;letter-spacing:7px;font-weight:700;margin:2px 0 12px;color:#222;font-family:'HY견고딕','Malgun Gothic',sans-serif}
  table.xls{border-collapse:collapse;width:100%;min-width:560px;font-size:12px;font-family:'Malgun Gothic',sans-serif;color:#222}
  table.xls td{border:1px solid #b9b9b9;padding:0;height:30px;vertical-align:middle}
  table.xls td.lbl,table.xls td.sec{background:#FFF2CC;text-align:center;font-weight:700;padding:4px 6px}
  table.xls td.sub{background:#FFF2CC;text-align:center;padding:4px 6px}
  table.xls td.full{background:#FFF2CC;text-align:center;font-weight:700;padding:5px}
  table.xls .xin{width:100%;box-sizing:border-box;border:0;background:transparent;padding:5px 7px;font:inherit;color:#222}
  table.xls .xin:focus{outline:2px solid var(--primary);outline-offset:-2px;background:#fff}
  table.xls td.num,table.xls td.num .xin{text-align:right}
  table.xls td.total{text-align:right;font-weight:800;color:#0070C0;padding:5px 8px;font-size:13px}
  table.xls textarea.xin{resize:vertical;min-height:46px}
  .xls-inline{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:4px 7px}
  .xls-inline label{display:inline-flex;align-items:center;gap:4px;font-size:11.5px}
  .xls-ev{display:flex;gap:18px;padding:5px 8px;flex-wrap:wrap}
  .xls-note{font-size:10.5px;color:#999;padding:5px}
  .cmet-kpis .kpi{flex:1;min-width:120px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;text-align:center}
  .cmet-kpis .kpi .v{font-size:21px;font-weight:800;color:var(--primary);line-height:1.15}
  .cmet-kpis .kpi .l{font-size:11.5px;color:var(--ink-soft);margin-top:5px}
  table.ctab{width:100%;border-collapse:collapse;font-size:12.5px}
  table.ctab th{background:var(--surface-2);color:var(--ink-soft);font-weight:700;padding:8px 9px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
  table.ctab td{padding:7px 9px;text-align:center;border-bottom:1px solid var(--line)}
  table.ctab tr.tot td{font-weight:800;background:var(--surface-2);color:var(--primary)}
  #notifBell{position:relative;padding:6px 10px}
  .nbadge{position:absolute;top:-6px;right:-6px;background:#e5484d;color:#fff;font-size:10px;font-weight:800;min-width:17px;height:17px;line-height:17px;text-align:center;border-radius:9px;padding:0 4px;font-family:var(--fm)}
  .notifpanel{position:absolute;top:40px;right:0;width:320px;max-height:60vh;overflow:auto;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 34px rgba(0,0,0,.24);z-index:60}
  .np-h{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--line);font-size:13px}
  .np-snd{font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;cursor:pointer}
  .np-list{display:flex;flex-direction:column}
  .nrow{padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .nrow:hover{background:var(--surface-2)}
  .nrow.new{background:#eef5f4}
  .nrow-t{font-size:12.5px;font-weight:700;color:var(--primary)}
  .nrow-b{font-size:12.5px;margin-top:2px;color:var(--ink)}
  .nrow-d{font-size:10.5px;color:var(--muted);font-family:var(--fm);margin-top:3px}
  .nrow-empty{padding:20px;text-align:center;color:var(--muted);font-size:12.5px}
  .hbtn:hover{border-color:#fff;color:#fff}

  .layout{display:grid;grid-template-columns:212px minmax(0,1fr);align-items:start}
  .side{position:sticky;top:46px;height:calc(100vh - 46px);padding:18px 12px;border-right:1px solid var(--line);background:var(--surface-3);overflow:auto}
  .nav-sec{font-family:var(--fm);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:6px 10px;margin-top:8px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;cursor:pointer;color:var(--ink-soft);font-weight:450;font-size:13.5px}
  .nav-item:hover{background:var(--surface-2)}
  .nav-item.on{background:var(--primary-soft);color:var(--primary-ink);font-weight:600}
  .nav-item .ic{width:17px;text-align:center;opacity:.8}
  .nav-item .cnt{margin-left:auto;font-family:var(--fm);font-size:10.5px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:1px 7px}

  .content{padding:26px 30px 70px;min-width:0}
  .ph{margin-bottom:22px;display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .ph .eb{font-family:var(--fm);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
  .ph h2{font-family:var(--fd);font-weight:500;font-size:27px;margin:5px 0 3px;letter-spacing:-.01em}
  .ph p{margin:0;color:var(--ink-soft);font-size:13.5px;max-width:64ch}
  .ph .right{margin-left:auto;display:flex;gap:9px;flex-wrap:wrap}

  /* primitives */
  .btn{appearance:none;cursor:pointer;font-family:var(--fu);font-size:13px;font-weight:600;border-radius:9px;padding:9px 14px;border:1px solid transparent;transition:.13s}
  .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-ink)}
  .btn-ghost{background:var(--surface);color:var(--ink);border-color:var(--line-strong)}.btn-ghost:hover{background:var(--surface-2)}
  .btn-ok{background:var(--ok);color:#fff}.btn-ok:hover{filter:brightness(.94)}
  .btn-warn{background:var(--warn-bg);color:var(--warn);border-color:#e9c4ba}.btn-warn:hover{background:#f3d3c9}
  .btn-sm{padding:6px 11px;font-size:12px;font-weight:500}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .card-h h3{margin:0;font-size:13.5px;font-weight:600}
  .card-b{padding:16px 18px}
  .grid{display:grid;gap:16px}
  @media(min-width:760px){.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}}
  .split{display:grid;gap:18px}
  @media(min-width:980px){.split{grid-template-columns:minmax(0,1.45fr) minmax(0,1fr)}}

  label.fld{display:block;margin-bottom:14px}
  .lab{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
  .hint{font-weight:400;color:var(--muted);font-size:11.5px}
  input[type=text],input[type=password],input[type=number],input[type=date],textarea,select{width:100%;font-family:var(--fu);font-size:13px;color:var(--ink);border:1px solid var(--line-strong);border-radius:9px;padding:9px 11px;background:var(--surface)}
  textarea{resize:vertical;min-height:60px;line-height:1.55}
  input:focus,textarea:focus,select:focus,.btn:focus-visible,.hbtn:focus-visible,.nav-item:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
  input[type=file]{font-size:12px;color:var(--ink-soft)}
  input[type=file]::file-selector-button{font-family:var(--fu);font-size:12px;font-weight:600;color:var(--ink);background:var(--surface-2);border:1px solid var(--line-strong);border-radius:8px;padding:7px 11px;margin-right:10px;cursor:pointer}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{position:relative}
  .chip input{position:absolute;opacity:0;inset:0;cursor:pointer}
  .chip span{display:inline-block;padding:7px 12px;border:1px solid var(--line-strong);border-radius:999px;font-size:12px;color:var(--ink-soft);cursor:pointer;transition:.1s}
  .chip input:checked+span{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600}
  .chip input:focus-visible+span{outline:2px solid var(--brass);outline-offset:2px}

  .tag{font-family:var(--fm);font-size:10.5px;padding:1px 7px;border-radius:6px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft)}
  .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap;display:inline-block}
  .prio{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px}
  .prio.high{color:var(--warn);background:var(--warn-bg)} .prio.mid{color:var(--s-prod);background:var(--s-prod-bg)} .prio.low{color:var(--muted);background:var(--surface-2)}
  .avatar{width:24px;height:24px;border-radius:50%;display:inline-grid;place-items:center;font-size:10.5px;font-weight:700;color:#fff;background:var(--primary);flex:0 0 auto}

  /* stat */
  .stat{padding:15px 16px}
  .stat .l{font-size:11.5px;color:var(--muted);font-weight:500}
  .stat .v{font-family:var(--fd);font-weight:500;font-size:28px;letter-spacing:-.01em;margin-top:4px;line-height:1}
  .stat .s{font-size:11.5px;color:var(--muted);margin-top:5px}
  .stat .v.accent{color:var(--brass)}

  /* pipeline rail */
  .rail{display:flex;align-items:center;overflow-x:auto;padding-bottom:2px}
  .rail .nd{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto;width:52px;text-align:center}
  .rail .dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--line-strong);background:var(--surface);display:grid;place-items:center;font-size:9px;color:var(--muted)}
  .rail .seg{flex:1;height:2px;background:var(--line-strong);margin-top:-20px;min-width:10px}
  .rail .lb{font-size:9.5px;color:var(--muted);font-weight:500;line-height:1.15;margin:0}
  .rail .nd.done .dot{background:var(--primary);border-color:var(--primary);color:#fff}.rail .nd.done .lb{color:var(--ink-soft)}
  .rail .nd.cur .dot{background:#fff;border-color:var(--brass);box-shadow:0 0 0 4px var(--brass-soft);color:var(--brass)}.rail .nd.cur .lb{color:var(--brass);font-weight:700}
  .rail .seg.fill{background:var(--primary)}

  /* task list */
  .tlist{display:flex;flex-direction:column;gap:10px}
  .titem{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surface);border:1px solid var(--line);border-radius:11px;cursor:pointer;transition:.12s}
  .titem:hover{border-color:var(--line-strong);box-shadow:var(--shadow)}
  .titem .main{flex:1;min-width:0}
  .titem .tt{font-weight:600;font-size:14px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .titem .mt{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .titem .due{font-family:var(--fm);font-size:11px;color:var(--ink-soft)} .titem .due.over{color:var(--warn)}

  .ai-box{background:linear-gradient(180deg,#fbf8f1,#fdfcf9);border:1px solid var(--brass-soft);border-radius:11px;padding:13px 15px}
  .ai-h{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .ai-h .d{width:7px;height:7px;border-radius:50%;background:var(--brass)} .ai-h b{font-size:12px;font-weight:700;color:var(--brass)} .ai-h .src{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--muted)}
  .ai-lines{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
  .ai-lines li{display:flex;gap:9px;font-size:12.5px;line-height:1.5}
  .ai-lines .n{font-family:var(--fm);font-size:10.5px;color:var(--brass);font-weight:600;flex:0 0 auto;padding-top:1px}
  .ai-pending{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:9px}
  .spin{width:13px;height:13px;border:2px solid var(--line-strong);border-top-color:var(--brass);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .checks{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .check{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px}
  .check.pass{color:var(--ok);background:var(--ok-bg)} .check.warn{color:var(--warn);background:var(--warn-bg)}

  .prev{border:1px dashed var(--line-strong);border-radius:9px;background:var(--surface-2);padding:12px;text-align:center;color:var(--muted);font-size:12px}
  .prev a{color:var(--primary);font-weight:600;word-break:break-all}.prev .ic{font-size:22px;display:block;margin-bottom:3px}
  .prev-media{max-width:100%;max-height:240px;border-radius:7px;display:block;margin:0 auto}
  .prev-name{margin-top:7px;font-size:11.5px;color:var(--ink-soft);word-break:break-all}
  .prev-acts{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:9px}
  .lb{position:fixed;inset:0;background:rgba(10,12,15,.93);display:none;z-index:80;padding:24px}
  .lb.open{display:grid;place-items:center}
  .lb-body{max-width:96vw;max-height:92vh;display:grid;place-items:center}
  .lb-body img,.lb-body video{max-width:96vw;max-height:92vh;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .lb-frame{width:92vw;height:90vh;border:0;background:#fff;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  /* gantt */
  .gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .gantt{min-width:560px}
  .g-head{display:flex;font-family:var(--fm);font-size:10.5px;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:8px}
  .g-head .lbl{flex:0 0 200px}
  .g-head .scale{flex:1;display:flex;justify-content:space-between}
  .g-row{display:flex;align-items:center;gap:0;padding:6px 0;border-bottom:1px dashed var(--line)}

<script>
"use strict";
/* =====================================================================
   1. CONSTANTS  (도메인 정의 — 모델/뷰가 공유)
===================================================================== */
const STATUS_FLOW = [
  {key:"planning",      label:"기획",          short:"기획", owner:"member"},
  {key:"producing",     label:"제작중",        short:"제작", owner:"member"},
  {key:"manager_review",label:"팀장 검토",     short:"팀장", owner:"manager"},
  {key:"exec_review",   label:"대표 검토",     short:"대표", owner:"executive"},
  {key:"approved",      label:"승인",          short:"승인", owner:"manager"},
  {key:"executed",      label:"집행 완료",     short:"집행", owner:"manager"},
  {key:"analyzed",      label:"성과 분석 완료",short:"성과", owner:"manager"},
];
const STATUS = Object.fromEntries(STATUS_FLOW.map((s,i)=>[s.key,{...s,idx:i}]));
// 반려(수정 요청) — 선형 파이프라인 밖의 분기 상태. 위치상 '제작중'과 동일(idx 1)로 취급.
STATUS.revision = {key:"revision",label:"수정 요청",short:"수정",idx:1,owner:"member"};
const STATUS_STYLE = {planning:"--s-plan",producing:"--s-prod",revision:"--warn",manager_review:"--s-mgr",exec_review:"--s-exec",approved:"--s-appr",executed:"--s-exec2",analyzed:"--s-done"};

/* =====================================================================
   담당자별 캘린더 색상 (일정 화면 업무 막대 색 + 상단 범례)

function assigneeColor(name){
  if(!name) return "#8a98a0";
  if(ASSIGNEE_COLORS[name]) return ASSIGNEE_COLORS[name];
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0;
  return ASSIGNEE_FALLBACK[h % ASSIGNEE_FALLBACK.length];
}

// 결과를 boolean 으로 반환 — 호출부가 성공 여부에 따라 캐시 확정/롤백 결정
async function sbInsert(table,row){
  const {error}=await sb.from(table).insert(row);
  if(error){ console.error("[insert]",table,error); toast("저장 실패: "+error.message.slice(0,60)); return false; }
  return true;
}
async function sbUpdate(table,id,patch){
  const {error}=await sb.from(table).update(patch).eq("id",id);
  if(error){ console.error("[update]",table,error); toast("저장 실패: "+error.message.slice(0,60)); return false; }
  return true;
}
// 낙관적 삽입: 캐시에 먼저 넣고 렌더, 실패 시 캐시에서 제거(롤백)
async function optimisticInsert(coll, item, table, rowFn){
  coll.push(item);
  const ok=await sbInsert(table, rowFn(item));
  if(!ok){ const i=coll.indexOf(item); if(i>=0) coll.splice(i,1); render(); }
  return ok;
}
// 선검증 수정: DB 성공을 확인한 뒤에만 로컬 필드 확정. 실패 시 로컬 불변.
async function guardedUpdate(table, id, patch, applyLocal){
  const ok=await sbUpdate(table, id, patch);
  if(ok) applyLocal();
  return ok;
}

/* =====================================================================
   3. AI SERVICE  (시뮬레이터 + 실제 OpenAI / 프롬프트 빌더 분리)
   확장 지점: callOpenAI 를 Make 웹훅/서버로 교체하면 키 은닉 가능
===================================================================== */
let AI={key:"",model:"gpt-4o-mini",useReal:false,mode:"direct"};   // mode: 'direct'(브라우저 직접) | 'server'(Edge Function 경유)
const AiService=(()=>{
  async function call(system,user){
    if(AI.mode==="server"){                       // Supabase Edge Function 경유 (사내망 우회·키 은닉)
      const {data,error}=await sb.functions.invoke("ai-proxy",{body:{model:AI.model,system,user}});
      if(error) throw new Error("서버 함수 호출 실패: "+(error.message||String(error)).slice(0,200));
      if(data&&data.error) throw new Error("OpenAI "+(data.status||"")+": "+String(data.error).slice(0,300));
      return JSON.parse(String((data&&data.content)||"").replace(/```json|```/g,"").trim());
    }
    const res=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+AI.key},
      body:JSON.stringify({model:AI.model,temperature:0.4,response_format:{type:"json_object"},
        messages:[{role:"system",content:system},{role:"user",content:user}]})});
    if(!res.ok){const t=await res.text();throw new Error("OpenAI "+res.status+": "+t.slice(0,300));}
    const data=await res.json();
    return JSON.parse((data.choices?.[0]?.message?.content||"").replace(/```json|```/g,"").trim());
  }
  const live=()=>AI.useReal&&(AI.mode==="server"||!!AI.key);   // 서버 경유는 브라우저 키 불필요
  // --- 3.1 업로드 검사
  function simChecks(asset){
    const txt=((asset.note||"")+" "+(asset.keywords||"")+" "+(asset.body||"")).toLowerCase();
    const has=arr=>arr.some(w=>txt.includes(w));
    return {
      tone:{status:"pass",note:"브랜드 톤과 부합"},
      cta:has(["신청","구매","문의","지금","클릭","예약","가입","상담"])?{status:"pass",note:"행동 유도 문구 확인"}:{status:"warn",note:"명확한 CTA가 드러나지 않음"},
      typo:{status:"pass",note:"이상 없음"},
      legal:has(["최고","1위","유일","100%","완치","보장"])?{status:"warn",note:"과장·단정 표현 점검 필요"}:{status:"pass",note:"이상 없음"},
      review:has(["의료","효능","임상","아동","의약"])?{status:"warn",note:"심의 대상 가능성 검토"}:{status:"pass",note:"이상 없음"},
    };
  }
  async function checks(asset,task,brand){
    if(live()){
      try{
        const sys=`너는 마케팅 산출물 품질 검수자다. 항목별로 status("pass"|"warn")와 한 줄 note를 작성. JSON만 출력:
{"tone":{"status":"","note":""},"cta":{"status":"","note":""},"typo":{"status":"","note":""},"legal":{"status":"","note":""},"review":{"status":"","note":""}}`;
        const usr=`[브랜드]${brand.name} / 톤:${brand.tone}\n[업무목적]${task.purpose}\n[유형]${ASSET_TYPES[asset.type]}\n[설명]${asset.note}\n[키워드]${asset.keywords}\n[본문]${asset.body||""}\n위 산출물을 브랜드톤/CTA/오탈자/법무위험/심의위험 관점에서 검사.`;
        const r=await call(sys,usr); return r;
      }catch(e){toast("AI 검사 실패 — 시뮬레이터로 대체");}
    }
    await wait(700); return simChecks(asset);
  }
  // --- 3.2 대표 보고 요약 (피드백 라이브러리 참고)
  function simReport(task,brand){
    const k=task.kpis.map(x=>x.metric).join("·")||"KPI";
    return [
      `작업 목적: ${task.purpose} — ${brand.name} ${brand.goal.split(" ").slice(0,4).join(" ")} 강화`,
      `KPI: ${k} 목표 달성을 통한 정량 성과 추적`,
      `예상 영향: 타깃 도달·전환 개선으로 캠페인 목표 기여 예상`,
      `대표 승인 포인트: 브랜드 톤·법무 검수 완료, 일정 내 집행 가능`,
    ].join("\n");
  }
  async function execReport(task,brand){
    const past=Store.feedbackForBrand(task.brandId).slice(0,3).map(f=>`- ${f.purposeFit}/${f.decision}: ${f.note}`).join("\n")||"(없음)";
    if(live()){
      try{
        const sys=`너는 마케팅 디렉터다. 대표가 빠르게 승인 판단하도록 4줄 요약을 쓴다. 각 줄은 지정 접두로 시작, 60자 이내. 과거 대표 피드백 경향을 반영. JSON만:
{"line1":"작업 목적: ...","line2":"KPI: ...","line3":"예상 영향: ...","line4":"대표 승인 포인트: ..."}`;
        const usr=`[브랜드]${brand.name}(${brand.tone})\n[목표]${brand.goal}\n[업무]${task.title} / 목적:${task.purpose}\n[KPI]${task.kpis.map(x=>x.metric+" 목표 "+x.target).join(", ")}\n[과거 대표 피드백]\n${past}`;
        const r=await call(sys,usr); return [r.line1,r.line2,r.line3,r.line4].filter(Boolean).join("\n");
      }catch(e){toast("AI 요약 실패 — 시뮬레이터로 대체");}
    }
    await wait(900); return simReport(task,brand);
  }
  // --- 3.3 성과 분석 → 회고
  function simRetro(task,perf){
    const hit=task.kpis.filter(k=>k.actual!=null&&k.actual>=k.target);
    return {
      good: hit.length?`${hit.map(k=>k.metric).join("·")} 목표 달성. 핵심 소재의 반응 양호`:"일정 내 집행 완료, 운영 안정적",
      bad: "일부 채널 도달이 기대 대비 낮음, 소재 다양성 부족",
      next: "고성과 소재 포맷 확대, 채널별 타깃 메시지 분리 운영",
    };
  }
  async function retro(task,perf){
    if(live()){
      try{
        const sys=`너는 퍼포먼스 분석가다. 성과 데이터로 회고를 작성. JSON만:{"good":"","bad":"","next":""} (각 1~2문장)`;
        const usr=`[업무]${task.title}/목적:${task.purpose}\n[KPI목표]${task.kpis.map(k=>k.metric+":"+k.target).join(", ")}\n[성과]CTR ${perf.ctr}, CVR ${perf.cvr}, ROAS ${perf.roas}, 매출 ${perf.revenue}, 상담 ${perf.consults}, 도달 ${perf.reach}`;
        return await call(sys,usr);
      }catch(e){toast("AI 분석 실패 — 시뮬레이터로 대체");}
    }
    await wait(900); return simRetro(task,perf);
  }
  async function meetingSummary(meeting){
    const text=(meeting.minutes||"").trim();
    if(live()){
      try{
        const sys=`너는 회의 기록 보조자다. 회의록을 바탕으로 (1) 핵심 요약(3~5개 불릿), (2) 결정 사항, (3) 후속 액션(담당/기한 추정 포함 가능), (4) 추가로 논의·검토하면 좋은 방향성 제안 2~3가지를 작성한다. 한국어. JSON만 출력:
{"summary":["",""],"decisions":["",""],"actions":["",""],"directions":["",""]}`;
        const usr=`[회의명]${meeting.title||"-"}\n[일자]${meeting.date}${meeting.time?" "+meeting.time:""}\n[안건]${meeting.agenda}\n[참석자]${meeting.attendees}\n[회의록]\n${text}`;
        return await call(sys,usr);
      }catch(e){ console.error("[meetingSummary]",e); toast("AI 요약 실패: "+String(e&&e.message||e).slice(0,90)); }
    }
    await wait(800);
    const lines=text.split(/\n+/).map(s=>s.replace(/^[-*•\d.\s]+/,"").trim()).filter(Boolean);
    return {
      summary: lines.slice(0,4).length?lines.slice(0,4):["회의록 내용이 짧아 요약할 내용이 부족합니다."],
      decisions: lines.filter(l=>/확정|결정|승인|채택/.test(l)).slice(0,3),
      actions: lines.filter(l=>/까지|담당|진행|준비|작성|공유|제작/.test(l)).slice(0,4),
      directions: ["다음 회의에서 후속 액션의 진행 상황을 점검하세요.","결정되지 않은 안건은 담당자를 지정해 마감일을 정하면 좋습니다."],
    };
  }
  return {checks,execReport,retro,meetingSummary,live};
})();
const wait=ms=>new Promise(r=>setTimeout(r,ms));

/* =====================================================================
   4. STATS SERVICE  (운영 통계 — 파생 데이터 계산만 담당)
===================================================================== */
const Stats=(()=>{
  const db=()=>Store.db;
  const avgApprovalDays=()=>{ // 생성→승인(approved 도달) 평균. 근사: 승인/이후 상태 task의 updatedAt-createdAt
    const ts=db().tasks.filter(t=>STATUS[t.status].idx>=STATUS.approved.idx);
    if(!ts.length)return null; return (ts.reduce((s,t)=>s+(t.updatedAt-t.createdAt),0)/ts.length/86400000);
  };
  const rejectCount=()=>db().reviews.filter(r=>r.decision==="rejected").length;
  const byMember=()=>db().users.filter(u=>u.role==="member").map(u=>{
    const ts=db().tasks.filter(t=>t.ownerId===u.id);
    const revs=db().reviews.filter(r=>ts.some(t=>t.id===r.taskId));
    const appr=revs.filter(r=>r.decision==="approved").length, rej=revs.filter(r=>r.decision==="rejected").length;
    const vers=db().versions.filter(v=>db().assets.some(a=>a.id===v.assetId&&ts.some(t=>t.id===a.taskId)));
    const assetCount=db().assets.filter(a=>ts.some(t=>t.id===a.taskId)).length||1;
    const executed=ts.filter(t=>STATUS[t.status].idx>=STATUS.executed.idx).length;
    const analyzed=ts.filter(t=>STATUS[t.status].idx>=STATUS.analyzed.idx).length;
    return {id:u.id,name:u.name,tasks:ts.length,executed,analyzed,apprRate:appr+rej?Math.round(appr/(appr+rej)*100):0,rejRate:appr+rej?Math.round(rej/(appr+rej)*100):0,avgRework:(vers.length/assetCount).toFixed(1)};
  });
  const byBrand=()=>db().brands.map(b=>{
    const ts=db().tasks.filter(t=>t.brandId===b.id);
    const revs=db().reviews.filter(r=>ts.some(t=>t.id===r.taskId));
    const rej=revs.filter(r=>r.decision==="rejected").length;
    return {name:b.name,tasks:ts.length,rejRate:revs.length?Math.round(rej/revs.length*100):0};
  });
  const rejectTop=()=>{ const m={}; db().reviews.filter(r=>r.decision==="rejected"&&r.cat).forEach(r=>m[r.cat]=(m[r.cat]||0)+1);
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5); };
  // 집행완료(이상) 업무 — 데이터는 유지되므로 이력으로 노출
  const executedTasks=()=>db().tasks.filter(t=>STATUS[t.status].idx>=STATUS.executed.idx);
  const executedCount=()=>executedTasks().length;
  const completedHistory=()=>executedTasks().map(t=>{
    const acts=Store.activityOf(t.id);
    const exAct=acts.filter(a=>a.type==="status"&&/집행\s*완료/.test(a.message||"")).sort((a,b)=>a.ts-b.ts)[0];
    return {id:t.id,title:t.title,status:t.status,owner:Store.user(t.ownerId)?.name||"-",brand:Store.brand(t.brandId)?.name||"-",when:exAct?exAct.ts:t.updatedAt};
  }).sort((a,b)=>b.when-a.when);
  return {avgApprovalDays,rejectCount,byMember,byBrand,rejectTop,executedTasks,executedCount,completedHistory};
})();

/* =====================================================================
   4-B. 알림 설정 (관리자) — 브라우저 저장(배포 환경에서 유지)
   ※ 조직 공유가 필요하면 추후 app_settings 테이블로 이전 가능
===================================================================== */
const Settings=(()=>{
  const KEY="mktops_notify_settings";
  const def={enabled:true,
    kakaoEnabled:false, webhookUrl:"",            // 카카오(솔라피) — 추후 사용
    emailEnabled:true, emailWebhookUrl:"",        // 이메일 — 지금 사용
    events:{task_created:true,task_created_me:false,review_requested:true,review_resubmitted:true,review_submitted:true,review_resubmitted_me:true,rejected:true,approved:true,post_created:true,comment_added:true,due_soon:true,overdue:true},
    deadline:{d1:true,dday:true,overdue:true}};
  let cache=null;
  function get(){ if(cache)return cache;
    try{ const s=JSON.parse(localStorage.getItem(KEY)); cache=Object.assign({},def,s||{});
      cache.events=Object.assign({},def.events,(s&&s.events)||{}); cache.deadline=Object.assign({},def.deadline,(s&&s.deadline)||{});
    }catch(e){ cache=JSON.parse(JSON.stringify(def)); } return cache; }
  function set(patch){ cache=Object.assign(get(),patch); try{ localStorage.setItem(KEY,JSON.stringify(cache)); }catch(e){} return cache; }
  return {get,set};
})();

/* =====================================================================
   4-C. NotificationService  (이벤트 → Webhook payload 전송 + 로그)
   - 프론트는 카카오 API를 직접 호출하지 않음. Webhook(Make/Zapier/서버)으로 payload 만 전송
   - Webhook URL 미설정 시 콘솔 + 알림 로그만 남김
   - channel 은 'kakao' 고정 발신이지만 payload 구조는 slack/email/jandi 로 확장 가능
===================================================================== */
const Notify=(()=>{
  const TYPES={
    task_created:{action:"새 업무가 추가되었습니다. 검토 흐름을 확인하세요."},
    task_created_me:{action:"내가 만든 새 업무가 생성되었습니다. 진행 상황을 확인하세요."},
    review_requested:{action:"팀원이 신규 검토를 요청했습니다. 산출물을 확인하고 승인 또는 반려하세요."},
    review_resubmitted:{action:"팀원이 수정 후 재검토를 요청했습니다. 다시 확인해 주세요."},
    review_submitted:{action:"검토 요청이 접수되었습니다. 팀장 검토 결과를 기다려 주세요."},
    review_resubmitted_me:{action:"재검토 요청이 접수되었습니다. 팀장 검토 결과를 기다려 주세요."},
    post_created:{action:"커뮤니티에 새 글이 작성되었습니다."},
    comment_added:{action:"내가 작성한 글에 새 댓글이 달렸습니다."},
    asset_added:{action:"새 산출물이 등록되었습니다. 확인하세요."},
    rejected:{action:"반려되었습니다. 사유 확인 후 수정해 재제출하세요."},
    sent_to_exec:{action:"대표 검토가 필요합니다."},
    exec_decision:{action:"대표 검토 의견이 등록되었습니다."},
    approved:{action:"팀장 최종 승인되었습니다. 일정에 반영됩니다."},
    due_soon:{action:"마감이 임박했습니다. 진행 상태를 점검하세요."},
    overdue:{action:"마감이 지났습니다. 즉시 조치가 필요합니다."},
  };
  const PRI={high:"높음",mid:"보통",low:"낮음"};
  function taskUrl(id){ const base=location.href.split("#")[0]; return `${base}#task/${id}`; }
  function buildMessage(p){
    const note = p.note ? `\n${p.noteLabel||"메모"}: ${p.note}` : "";
    return `[마케팅 업무 알림]\n업무명: ${p.title}\n브랜드: ${p.brand}\n담당자: ${p.owner}\n상태: ${p.status}\n마감일: ${p.dueDate}\n우선순위: ${p.priority}\n필요 액션: ${p.actionText}${note}\n바로가기: ${p.url}`;
  }
  function buildEmailHtml(p){
    const note = p.note ? `<div style="margin-top:14px;border-left:3px solid #2f6f63;background:#f1f6f4;padding:10px 14px;border-radius:0 8px 8px 0">
        <div style="font-size:11px;color:#5e7a72;font-weight:700;margin-bottom:4px">${esc(p.noteLabel||"메모")}</div>
        <div style="font-size:13px;color:#33424a;white-space:pre-wrap">${esc(p.note)}</div></div>` : "";
    return `<div style="font-family:'Apple SD Gothic Neo',Arial,sans-serif;max-width:560px;margin:0 auto;border:1px solid #e6e9ec;border-radius:12px;overflow:hidden">
      <div style="background:#27474f;color:#fff;padding:16px 20px;font-size:15px;font-weight:600">마케팅 운영 플랫폼 · 업무 알림</div>
      <div style="padding:20px">
        <p style="margin:0 0 14px;color:#33424a;font-size:14px">${esc(p.actionText)}</p>
        <table style="width:100%;border-collapse:collapse;font-size:13px;color:#33424a">
          <tr><td style="padding:6px 0;color:#8a98a0;width:80px">업무명</td><td style="padding:6px 0;font-weight:600">${esc(p.title)}</td></tr>
          <tr><td style="padding:6px 0;color:#8a98a0">브랜드</td><td style="padding:6px 0">${esc(p.brand)}</td></tr>
          <tr><td style="padding:6px 0;color:#8a98a0">담당자</td><td style="padding:6px 0">${esc(p.owner)}</td></tr>
          <tr><td style="padding:6px 0;color:#8a98a0">상태</td><td style="padding:6px 0">${esc(p.status)}</td></tr>
          <tr><td style="padding:6px 0;color:#8a98a0">마감일</td><td style="padding:6px 0">${esc(p.dueDate)}</td></tr>
          <tr><td style="padding:6px 0;color:#8a98a0">우선순위</td><td style="padding:6px 0">${esc(p.priority)}</td></tr>
        </table>
        ${note}
        <a href="${p.url}" style="display:inline-block;margin-top:16px;background:#2f6f63;color:#fff;text-decoration:none;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600">업무 바로가기 →</a>
      </div></div>`;
  }
  function resolveRecipients(role,task){
    const us=Store.db.users, owner=us.filter(u=>u.id===task.ownerId), mgr=us.filter(u=>u.role==="manager"), exec=us.filter(u=>u.role==="executive");
    if(role==="manager")return mgr;
    if(role==="executive")return exec;
    if(role==="member")return owner.filter(u=>u.role==="member"); // 본인 확인 메일은 실무자 담당자에게만
    if(role==="owner")return owner; // 업무 소유자(생성자) 본인 — 역할 무관
    if(role==="manager+member")return [...mgr,...owner.filter(u=>u.role==="member")];
    if(role==="owner+manager")return [...owner.filter(u=>u.role==="member"),...mgr];
    return [];
  }
  async function postWebhook(url,payload){
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(!res.ok) throw new Error("HTTP "+res.status);
  }
  // ── 발송 큐: 모든 알림 웹훅을 한 번에 하나씩 + 간격을 두고 순차 전송 (429 방지) ──
  const QUEUE=[]; let working=false; const SEND_GAP=1200; // 발송 간 간격(ms)
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  function enqueue(job){ QUEUE.push(job); if(!working) drain(); }
  async function drain(){
    working=true;
    while(QUEUE.length){
      const job=QUEUE.shift();
      try{ await postWebhook(job.url,job.payload); job.log.status="sent"; }
      catch(e){ job.log.status="failed"; job.log.errorMessage=(e&&e.message)||String(e); console.error("[NOTIFY] webhook failed:",e); }
      Store.addNotif(job.log);
      if(QUEUE.length) await sleep(SEND_GAP);
    }
    working=false;
  }
  // 외부 API 시그니처: send({type, recipientRole, taskId})
  async function dispatch(type, users, ctx){
    const cfg=Settings.get();
    if(!cfg.enabled) return;
    if(cfg.events && cfg.events[type]===false) return;
    const meta=TYPES[type]||{action:""};
    const seen={}, seenEmail={};
    const list=(users||[]).filter(u=>{
      if(!u||!u.id||seen[u.id]) return false; seen[u.id]=1;
      const em=(u.email||"").toLowerCase(); if(em){ if(seenEmail[em]) return false; seenEmail[em]=1; }
      return true;
    });
    for(const u of list){
      const base={type, recipientId:u.id, recipientName:u.name, recipientRole:u.role, recipientEmail:u.email||"", recipientPhone:u.phone||"",
        taskId:ctx.taskId||null, title:ctx.title||"", brand:ctx.brand||"-", owner:ctx.owner||"",
        status:ctx.status||"-", dueDate:ctx.dueDate||"-", priority:ctx.priority||"-",
        note:ctx.note||"", noteLabel:ctx.noteLabel||"",
        actionText:meta.action, url:ctx.url||location.href.split("#")[0]};
      base.message=buildMessage(base);
      if(cfg.emailEnabled){
        const subject=`[마케팅 알림] ${base.title} · ${base.status}`;
        const ep={...base, channel:"email", to:u.email||"", subject, text:base.message, html:buildEmailHtml(base)};
        const elog={id:Store.uid(),type,taskId:ctx.taskId||null,recipientId:u.id,recipientRole:u.role,channel:"email",message:`${u.email||"(이메일 없음)"} · ${subject}`,status:"queued",errorMessage:null,sentAt:Date.now()};
        if(!u.email){ elog.status="skipped"; elog.errorMessage="수신자 이메일 없음"; Store.addNotif(elog); }
        else if(!cfg.emailWebhookUrl){ elog.status="skipped"; elog.errorMessage="이메일 Webhook 미설정 — 콘솔/로그만"; console.log("[EMAIL] (no webhook) payload:",ep); Store.addNotif(elog); }
        else { enqueue({url:cfg.emailWebhookUrl,payload:ep,log:elog}); }   // 큐에 적재 → 순차 발송
      }
      if(cfg.kakaoEnabled){
        const kp={...base, channel:"kakao"};
        const klog={id:Store.uid(),type,taskId:ctx.taskId||null,recipientId:u.id,recipientRole:u.role,channel:"kakao",message:kp.message,status:"queued",errorMessage:null,sentAt:Date.now()};
        if(!cfg.webhookUrl){ klog.status="skipped"; klog.errorMessage="Webhook URL 미설정 — 콘솔/로그만"; console.log("[KAKAO] (no webhook) payload:",kp); Store.addNotif(klog); }
        else { enqueue({url:cfg.webhookUrl,payload:kp,log:klog}); }
      }
    }
  }
  // 업무 기반 발송
  async function send({type,recipientRole,taskId,extra}){
    const t=Store.task(taskId); if(!t) return;
    const b=Store.brand(t.brandId);
    let users=resolveRecipients(recipientRole,t);
    // 안전장치: 팀장/대표는 전체 수신 가능하나, 실무자는 '본인이 담당자인 업무'만 수신
    users=users.filter(u=>u.role==="manager"||u.role==="executive"||u.id===t.ownerId);
    await dispatch(type, users, {taskId:t.id, title:t.title, brand:b?b.name:"-", owner:Store.user(t.ownerId)?.name||"",
      status:STATUS[t.status].label, dueDate:fmtFullDay(t.due), priority:PRI[t.priority]||t.priority, url:taskUrl(t.id), ...(extra||{})});
  }
  // 커뮤니티 발송
  async function notifyNewPost(post){
    const users=Store.db.users.filter(u=>u.id!==post.authorId); // 작성자 제외 전원
    await dispatch("post_created", users, {title:post.title, owner:Store.user(post.authorId)?.name||"", brand:"-", status:"커뮤니티", url:location.href.split("#")[0]});
  }
  async function notifyNewComment(post, commenterId){
    const author=Store.user(post.authorId);
    if(!author || author.id===commenterId) return; // 본인 글에 본인 댓글이면 알림 없음
    await dispatch("comment_added", [author], {title:post.title, owner:author.name, brand:"-", status:"커뮤니티", url:location.href.split("#")[0]});
  }
  // 검토/재검토 이벤트: 팀장(들) + 담당자(실무자)에게, 한 사람·한 메일함당 1통만
  async function sendReviewEvent(taskId, kind){
    const t=Store.task(taskId); if(!t) return;
    const b=Store.brand(t.brandId);
    const ctxBase={taskId:t.id,title:t.title,brand:b?b.name:"-",owner:Store.user(t.ownerId)?.name||"",
      status:STATUS[t.status].label,dueDate:fmtFullDay(t.due),priority:PRI[t.priority]||t.priority,url:taskUrl(t.id)};
    const mgrType=kind==="resubmit"?"review_resubmitted":"review_requested";
    const meType =kind==="resubmit"?"review_resubmitted_me":"review_submitted";
    const note=latestVersionNote(taskId);
    const entries=[];
    Store.db.users.filter(u=>u.role==="manager").forEach(u=>entries.push({u,type:mgrType,extra:note})); // 팀장 먼저(공유 메일함이면 팀장 메시지 우선)
    const owner=Store.user(t.ownerId);
    if(owner && owner.role==="member") entries.push({u:owner,type:meType,extra:undefined});
    // 사람 id + 이메일 기준 중복 제거 → 한 메일함당 1통
    const seen={}, seenEmail={}, finalList=[];
    for(const e of entries){
      if(!e.u||seen[e.u.id]) continue; seen[e.u.id]=1;
      const em=(e.u.email||"").toLowerCase(); if(em){ if(seenEmail[em]) continue; seenEmail[em]=1; }
      finalList.push(e);
    }
    for(const e of finalList){ await dispatch(e.type,[e.u],{...ctxBase, ...(e.extra||{})}); }
  }
  // 마감 점검 (6,7). 동시 접속 중복 방지를 위해 '팀장' 세션에서만 작동.
  function deadlineCheck(){
    const cfg=Settings.get(); if(!cfg.enabled) return; if(!me()||me().role!=="manager") return;
    const now=Date.now(), day=86400000;
    const sod=ts=>{ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); };
    const todayDay=sod(now);
    Store.db.tasks.forEach(t=>{
      if(STATUS[t.status].idx>=STATUS.executed.idx) return; // 집행/성과 단계는 제외
      const dueDay=sod(t.due), diffDays=Math.round((dueDay-todayDay)/day); let type=null;
      if(diffDays<0 && cfg.deadline.overdue) type="overdue";          // 마감일 다음날부터(1일 후~)
      else if(diffDays===0 && cfg.deadline.dday) type="due_soon";     // 당일
      else if(diffDays===1 && cfg.deadline.d1) type="due_soon";       // 하루 전
      if(!type) return;
      if(Store.db.notifs.some(n=>n.taskId===t.id&&n.type===type&&sameDay(n.sentAt,now)&&n.status!=="failed")) return; // 하루 1회
      send({type,recipientRole:"manager+member",taskId:t.id});
    });
  }
  async function testEmail(){
    const cfg=Settings.get();
    const u=me(); if(!u){ toast("로그인이 필요합니다"); return; }
    if(!u.email){ toast("내 계정에 이메일이 없습니다"); return; }
    const base={type:"task_created",recipientName:u.name,title:"테스트 알림",brand:"-",owner:u.name,status:"테스트",dueDate:fmtFullDay(Date.now()),priority:"보통",actionText:"이메일 알림 연동 테스트입니다.",url:location.href.split("#")[0]};
    base.message=buildMessage(base);
    const ep={...base,channel:"email",to:u.email,subject:"[마케팅 알림] 이메일 연동 테스트",text:base.message,html:buildEmailHtml(base)};
    if(!cfg.emailWebhookUrl){ toast("이메일 Webhook URL을 먼저 입력·저장하세요"); console.log("[EMAIL TEST] payload:",ep); return; }
    try{ await postWebhook(cfg.emailWebhookUrl,ep); toast(`${u.email}로 테스트 발송 요청 완료`); }
    catch(e){ toast("발송 실패: "+((e&&e.message)||"")); }
  }
  // 회의 참석자 인앱 알림 (task 아님 → notification_logs에 직접 적재, channel=email 1건)
  async function notifyMeeting(meeting, userIds){
    const when=(meeting.date||"")+(meeting.time?(" "+meeting.time):"");
    const mname=meeting.title||"회의";
    const body=`[${mname}] ${when} 회의에 참석자로 지정되었습니다`;
    const ids=[...new Set((userIds||[]).filter(id=>id && id!==me().id))];
    for(const uid of ids){
      const u=Store.user(uid); if(!u) continue;
      const log={id:Store.uid(),type:"meeting_invited",taskId:null,recipientId:uid,recipientRole:u.role,channel:"email",message:body,status:"queued",errorMessage:null,sentAt:Date.now()};
      await Store.addNotif(log);
    }
  }
  // 공동검수자 지정 알림
  async function notifyCoreview(task, userIds){
    const body=`[${task.title||"업무"}] 공동검수자로 지정되었습니다 — 열람·검수 의견을 남겨주세요`;
    const ids=[...new Set((userIds||[]).filter(id=>id && id!==me().id))];
    for(const uid of ids){ const u=Store.user(uid); if(!u) continue;
      await Store.addNotif({id:Store.uid(),type:"coreview_requested",taskId:task.id,recipientId:uid,recipientRole:u.role,channel:"email",message:body,status:"queued",errorMessage:null,sentAt:Date.now()}); }
  }
  // 공동검수 완료 → 팀장에게 알림
  async function notifyCoreviewDone(task, reviewerId){
    const who=Store.user(reviewerId)?.name||"공동검수자";
    const body=`[${task.title||"업무"}] ${who}님이 검수를 완료했습니다 — 최종 승인/반려를 진행해 주세요`;
    const mgrs=Store.db.users.filter(u=>u.role==="manager"&&u.id!==me().id);
    for(const u of mgrs){ await Store.addNotif({id:Store.uid(),type:"coreview_done",taskId:task.id,recipientId:u.id,recipientRole:u.role,channel:"email",message:body,status:"queued",errorMessage:null,sentAt:Date.now()}); }
  }
  return {send, deadlineCheck, taskUrl, testEmail, notifyNewPost, notifyNewComment, sendReviewEvent, notifyMeeting, notifyCoreview, notifyCoreviewDone};
})();

const esc=s=>(s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtDay=ts=>{const d=new Date(ts);return `${d.getMonth()+1}/${d.getDate()}`;};
const fmtFullDay=ts=>{const d=new Date(ts);return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;};
const fmtDate=ts=>{const d=new Date(ts);return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;};
const fmtDT=ts=>{const d=new Date(ts);return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;};

const fmtBytes=b=>{b=b||0;if(b>=1048576)return (b/1048576).toFixed(1)+"MB";if(b>=1024)return Math.round(b/1024)+"KB";return b+"B";};
const initials=n=>(n||"?").slice(0,2);
function docKind(a){
  const n=(a.fileName||"").toLowerCase(), m=(a.fileMime||"").toLowerCase();
  if(m.includes("pdf")||n.endsWith(".pdf")) return "pdf";
  if(/\.(pptx?|docx?|xlsx?)$/.test(n)||m.includes("presentation")||m.includes("msword")||m.includes("wordprocessing")||m.includes("spreadsheet")||m.includes("officedocument")) return "office";
  return null;
}
function ddayInfo(t){
  if(STATUS[t.status].idx>=STATUS.executed.idx) return null; // 집행/성과 단계는 D-day 표시 안 함
  const day=86400000;
  const startDay=new Date(); startDay.setHours(0,0,0,0);
  const dueDay=new Date(t.due); dueDay.setHours(0,0,0,0);
  const diff=Math.round((dueDay.getTime()-startDay.getTime())/day);
  if(diff>0) return {text:`D-${diff}`, cls:"mid"};
  if(diff===0) return {text:"D-Day", cls:"high"};
  return {text:`마감 +${Math.abs(diff)}일`, cls:"over"};
}

const Modal=(()=>{
  let onSubmit=null;
  const wrap=()=>document.getElementById("mwrap");
  function open({title,body,okLabel="저장",wide=false,submit}){
    document.getElementById("mTitle").textContent=title;
    document.getElementById("mBody").innerHTML=body;
    document.getElementById("mOk").textContent=okLabel;
    document.getElementById("modal").classList.toggle("wide",wide);
    onSubmit=submit; wrap().classList.add("open");
  }
  function close(){ wrap().classList.remove("open"); onSubmit=null; }
  async function ok(){ if(!onSubmit){close();return;} const btn=document.getElementById("mOk"); if(btn.disabled)return; btn.disabled=true; const label=btn.textContent; btn.textContent="처리 중…"; let keep; try{ keep=await onSubmit(); } catch(e){ console.error(e); toast("처리 중 오류가 발생했습니다"); keep=false; } finally{ btn.disabled=false; btn.textContent=label; } if(keep!==false) close(); }
  return {open,close,ok};
})();

function filtered(list){
  const f=session.filters;
  const q=(f.q||"").trim().toLowerCase();
  return list.filter(t=>{
    if(q){ const bn=(Store.brand(t.brandId)?.name||"").toLowerCase(); const ti=(t.title||"").toLowerCase();
      if(!(ti.includes(q)||bn.includes(q))) return false; }
    if(f.status && t.status!==f.status) return false;
    if(f.hideExecuted && t.status==="executed") return false;
    if(f.brand && t.brandId!==f.brand) return false;

function dashMember(){
  const u=me(); const mine=Store.db.tasks.filter(t=>t.ownerId===u.id);

  const today=mine.filter(t=>sameDay(t.due,Date.now()));
  const approved=mine.filter(t=>STATUS[t.status].idx>=STATUS.approved.idx);
  // 반려된 업무: 현재 '수정 요청' 상태이거나, 최근 리뷰가 반려이며 아직 검토 전

  return `

    ${C.stat({l:"반려된 업무",v:rejected.length})}
    ${C.stat({l:"집행완료",v:done.length})}

function communityPreview(att){
  if(!att||!att.fileData) return "";
  const mime=att.fileMime||"", name=att.fileName||"첨부", url=att.fileData;
  const dlBtn=`<button class="btn btn-ghost btn-sm" data-act="download-asset" data-src="${url}" data-name="${esc(name)}">⬇ 다운로드</button>`;
  if(mime.startsWith("image/")) return `<div class="prev" style="margin-top:10px"><img src="${url}" class="prev-media" data-act="zoom" data-kind="image" data-src="${url}" data-name="${esc(name)}" style="cursor:zoom-in"><div class="prev-acts"><button class="btn btn-ghost btn-sm" data-act="zoom" data-kind="image" data-src="${url}" data-name="${esc(name)}">🔍 확대</button>${dlBtn}</div></div>`;
  if(mime.startsWith("video/")) return `<div class="prev" style="margin-top:10px"><video src="${url}" class="prev-media" controls playsinline style="background:#000"></video><div class="prev-acts">${dlBtn}</div></div>`;
  const dk=docKind({fileName:name,fileMime:mime});
  if(dk==="pdf") return `<div class="prev" style="margin-top:10px"><span class="ic">📕</span><div class="prev-name">${esc(name)}</div><div class="prev-acts"><button class="btn btn-ghost btn-sm" data-act="doc-view" data-kind="pdf" data-src="${url}" data-dl="${url}" data-name="${esc(name)}">🔍 미리보기</button>${dlBtn}</div></div>`;
  if(dk==="office"){ const v="https://view.officeapps.live.com/op/embed.aspx?src="+encodeURIComponent(url); return `<div class="prev" style="margin-top:10px"><span class="ic">📎</span><div class="prev-name">${esc(name)}</div><div class="prev-acts"><button class="btn btn-ghost btn-sm" data-act="doc-view" data-kind="office" data-src="${v}" data-dl="${url}" data-name="${esc(name)}">🔍 미리보기</button>${dlBtn}</div></div>`; }
  return `<div class="prev" style="margin-top:10px"><span class="ic">📎</span><div class="prev-name">${esc(name)}</div><div class="prev-acts"><a class="btn btn-ghost btn-sm" href="${url}" target="_blank" rel="noopener">↗ 열기</a>${dlBtn}</div></div>`;

function workloadCard(tasks,title){
  const list=tasks.filter(t=>t.due);
  if(!list.length) return "";
  const byMonth={},byYear={};
  list.forEach(t=>{const d=new Date(t.due),y=d.getFullYear(),key=`${y}.${String(d.getMonth()+1).padStart(2,"0")}`;byMonth[key]=(byMonth[key]||0)+1;byYear[y]=(byYear[y]||0)+1;});
  const months=Object.keys(byMonth).sort(), maxc=Math.max(...Object.values(byMonth)), years=Object.keys(byYear).sort();
  return `<div class="card" style="margin-top:18px"><div class="card-h"><h3>${title||"연·월별 업무 건수"}</h3><span class="tag">마감일 기준 · 총 ${list.length}건</span></div><div class="card-b">
    <div class="yearchips">${years.map(y=>`<span class="yearchip">${y}년 <b>${byYear[y]}</b>건</span>`).join("")}</div>
    ${months.map(m=>`<div class="mbar"><span class="ml">${m}</span><span class="mt"><span class="mf" style="width:${Math.max(4,Math.round(byMonth[m]/maxc*100))}%"></span></span><span class="mc">${byMonth[m]}</span></div>`).join("")}
  </div></div>`;
}
function ph(title,desc,right=""){return `<div class="ph"><div><div class="eb">marketing ops</div><h2>${title}</h2><p>${desc}</p></div>${right?`<div class="right">${right}</div>`:""}</div>`;}

function coReviewBlock(t, role){

  let myBox="";
  if(iAmR){

    myBox=`<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:10px">
      <div class="lab" style="margin-bottom:5px">내 검수 의견</div>

        : `<button class="btn btn-ok btn-sm" style="width:100%;margin-top:6px" data-act="coreview-done" data-id="${t.id}">✓ 검수 완료</button>`}

    </div>`;

function completionBlock(t){
  const ms=Store.membersOf(t.id);
  if(ms.length<=1) return "";   // 단독 업무: 체크 UI 불필요
  const mine=ms.find(m=>m.userId===me().id), doneCnt=ms.filter(m=>m.done).length;
  return `<div class="callout" style="margin-bottom:10px"><div style="font-weight:600;margin-bottom:6px">공동 담당자 완료 현황 (${doneCnt}/${ms.length})</div>
    ${ms.map(m=>{const u=Store.user(m.userId);return `<div class="row" style="justify-content:space-between;gap:8px;padding:3px 0"><span>${esc(u?.name||'-')}${m.userId===t.ownerId?' <span class="tag">소유자</span>':''}</span>${m.done?'<span class="check pass">완료</span>':'<span class="tag">대기</span>'}</div>`;}).join("")}
    ${mine?`<button class="btn ${mine.done?'btn-ghost':'btn-primary'} btn-sm" style="width:100%;margin-top:8px" data-act="toggle-done" data-id="${t.id}">${mine.done?'내 완료 취소':'✓ 내 작업 완료 표시'}</button>`:""}</div>`;
}
function actionPanel(t,role,lastReject){
  const s=t.status, idx=STATUS[s].idx;
  const owner=t.ownerId===me().id;
  const isWorker=Store.isWorker(t.id,me().id);
  const allDone=Store.allDone(t.id), multi=Store.membersOf(t.id).length>1;
  const reviewBtn=(label,act)=> allDone?btn(label,act,"btn-primary",t.id):`<div>${completionBlock(t)}<button class="btn btn-primary" style="width:100%;opacity:.5;cursor:not-allowed" disabled>${label} (공동 담당자 전원 완료 필요)</button></div>`;
  let html="";
  if(role==="viewer"){ return `<div class="hint">👁 읽기 전용(모니터링) 계정입니다. 현재 상태: <b>${STATUS[s].label}</b> · 조회만 가능합니다.</div>`; }
  if(role==="member"&&isWorker){
    if(s==="planning") html+=btn("제작 시작 →","advance","btn-primary",t.id);
    else if(s==="producing"){ if(allDone&&multi) html+=completionBlock(t); html+=reviewBtn("팀장 검토 요청 →","submit-review"); }
    else if(s==="revision"){
      if(lastReject) html+=`<div class="callout"><b>반려됨</b> [${esc(lastReject.cat||'')}] ${esc(lastReject.detail||'')}</div>`;
      html+=`<div class="hint" style="margin:8px 0 10px">위 사유를 반영해 산출물을 수정·재첨부(‘+ 산출물’ / ‘+ 버전’)한 뒤 다시 검토를 요청하세요.</div>`;
      if(allDone&&multi) html+=completionBlock(t); html+=reviewBtn("↻ 수정 완료 — 재검토 요청","resubmit-review");
    }
    else if(s==="approved"||s==="exec_review"){
      html+=btn("집행 완료로 표시 →","mark-executed","btn-primary",t.id);
      html+=`<div class="hint" style="margin-top:6px">집행이 끝나면 완료 처리하세요. 완료 시 알림 카운트에서 빠집니다.</div>`;
    }
    else html+=`<div class="hint">현재 단계에서 대기 중입니다.</div>`;
    if((s==="planning"||s==="producing"||s==="revision")&&owner){
      html+=`<button class="btn btn-warn" style="width:100%;margin-top:4px" data-act="delete-task" data-id="${t.id}">업무 삭제</button>`;
      html+=`<div class="hint" style="margin-top:6px">${s==="revision"?"반려된 업무를 접고 새로 만들 수 있습니다.":"팀장 검토 중에는 삭제할 수 없습니다."}</div>`;
    }
  } else if(role==="manager"){
    if(s==="manager_review"){ html+=btn("✓ 최종 승인 (검토 완료)","mgr-approve","btn-ok",t.id)+btn("반려","mgr-reject","btn-warn",t.id);
      html+=`<div class="info" style="margin-top:11px">승인 시 체크리스트 6항목을 확인합니다. 팀장 승인이 최종 검토 완료입니다.</div>`; }
    else if(s==="approved") html+=btn("집행 완료로 표시 →","mark-executed","btn-primary",t.id);
    else if(s==="exec_review") html+=btn("집행 완료로 표시 →","mark-executed","btn-primary",t.id);
    else if(s==="executed") html+=`<div class="hint">성과 입력 후 분석을 완료하세요.</div>`;
    else html+=`<div class="hint">현재 단계에서 별도 작업 없음.</div>`;
  } else if(role==="executive"){
    if(s==="exec_review"){ html+=btn("✓ 최종 승인","exec-approve","btn-ok",t.id)+btn("재검토 요청","exec-reject","btn-warn",t.id); }
    else html+=`<div class="hint">읽기 전용입니다. 결정이 필요한 단계가 아닙니다.</div>`;
  }
  return html||`<div class="hint">가능한 작업이 없습니다.</div>`;
}

function latestVersionNote(taskId){
  const ids=Store.assetsOf(taskId).map(a=>a.id);
  const vers=Store.db.versions.filter(v=>ids.includes(v.assetId)).sort((a,b)=>b.createdAt-a.createdAt);
  const v=vers[0]; if(!v) return undefined;
  return {noteLabel:`최신 버전(v${v.no}) 변경 사항`, note:`변경 내용: ${v.changes||"-"}\n변경 사유: ${v.reason||"-"}`};
}

/* ---- modals (forms) ---- */
function openTitleModal(id){
  const t=Store.task(id); if(!t){toast("업무를 찾을 수 없습니다");return;}
  const role=me().role, preReview=STATUS[t.status].idx<STATUS.manager_review.idx;
  if(!(role==="manager"||(role==="member"&&Store.isWorker(t.id,me().id)&&preReview))){ toast("검토 요청 전 단계의 담당자(또는 팀장)만 제목을 수정할 수 있습니다"); return; }
  Modal.open({title:"제목 수정",okLabel:"저장",body:`
    <label class="fld"><span class="lab">업무 제목</span><input type="text" id="tt_title" value="${esc(t.title)}" placeholder="업무 제목"></label>
    <div class="hint">변경 내역은 활동 기록에 남습니다.</div>`,
    submit:async()=>{
      const title=val("tt_title").trim(); if(!title){ toast("제목을 입력하세요"); return false; }
      if(title===t.title){ toast("변경된 내용이 없습니다"); return false; }
      const prev=t.title;
      const ok=await Store.update("tasks",id,{title,updated_at:iso(Date.now())},()=>{ t.title=title; t.updatedAt=Date.now(); });
      if(!ok){ toast("저장 실패 — 다시 시도하세요"); return false; }
      Store.log(me().id,id,"create",`제목 변경: ‘${prev}’ → ‘${title}’`);
      toast("제목이 변경되었습니다"); render();
    }});
}
function openScheduleModal(id){
  const t=Store.task(id); if(!t){toast("업무를 찾을 수 없습니다");return;}
  const owner=t.ownerId===me().id, role=me().role;
  if(!(role==="manager"||(role==="member"&&owner))){ toast("담당자 또는 팀장만 일정을 변경할 수 있습니다"); return; }
  const sval=t.start?new Date(t.start).toISOString().slice(0,10):"";
  const dval=t.due?new Date(t.due).toISOString().slice(0,10):"";
  Modal.open({title:"일정 변경",okLabel:"저장",body:`
    <div class="grid g2" style="gap:0 16px">
      <label class="fld"><span class="lab">시작일</span><input type="date" id="sc_start" value="${sval}"></label>
      <label class="fld"><span class="lab">마감일</span><input type="date" id="sc_due" value="${dval}"></label>
    </div>
    <div class="hint">현재 일정: ${t.start?fmtFullDay(t.start):"시작일 미정"} → ${fmtFullDay(t.due)} · 변경 내역은 활동 기록에 남습니다.</div>`,
    submit:async()=>{
      const start=val("sc_start")?new Date(val("sc_start")).getTime():null;
      const due=val("sc_due")?new Date(val("sc_due")).getTime():null;
      if(!due){ toast("마감일을 입력하세요"); return false; }
      if(start&&due<start){ toast("마감일은 시작일 이후여야 합니다"); return false; }
      if(start===t.start && due===t.due){ toast("변경된 내용이 없습니다"); return false; }
      const patch={start_date:start?iso(start):null,due:iso(due),updated_at:iso(Date.now())};
      const ok=await Store.update("tasks",id,patch,()=>{ t.start=start; t.due=due; t.updatedAt=Date.now(); });
      if(!ok){ toast("저장 실패 — 다시 시도하세요"); return false; }
      Store.log(me().id,id,"schedule",`일정 변경: 마감일 ${fmtFullDay(due)}${start?` (시작 ${fmtFullDay(start)})`:""}`);
      toast("일정이 변경되었습니다"); render();
    }});
}

async function makeWebpThumb(file, maxDim=720, q=0.72){
  if(!(file.type||"").startsWith("image/")) return null;
  try{
    let bmp, revoke=null;
    try{ bmp=await createImageBitmap(file,{imageOrientation:"from-image"}); }
    catch(_){ const url=URL.createObjectURL(file); revoke=url;
      bmp=await new Promise((res,rej)=>{ const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=url; }); }
    const iw=bmp.width||bmp.naturalWidth, ih=bmp.height||bmp.naturalHeight;
    if(!iw||!ih){ if(revoke)URL.revokeObjectURL(revoke); return null; }
    const scale=Math.min(1, maxDim/Math.max(iw,ih));
    const w=Math.max(1,Math.round(iw*scale)), h=Math.max(1,Math.round(ih*scale));
    const c=document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(bmp,0,0,w,h);
    if(bmp.close) bmp.close(); if(revoke) URL.revokeObjectURL(revoke);
    let blob=await new Promise(r=>c.toBlob(r,"image/webp",q));
    if(!blob) blob=await new Promise(r=>c.toBlob(r,"image/jpeg",q));   // WebP 미지원 브라우저 폴백
    if(!blob) return null;
    const ext=blob.type==="image/webp"?"webp":"jpg";
    return new File([blob],(file.name||"image").replace(/\.[^.]+$/,"")+"_thumb."+ext,{type:blob.type});
  }catch(e){ console.warn("썸네일 생성 실패:",e); return null; }
}
async function uploadOne(f){
  if(f.size>50*1024*1024){ toast(`${f.name}: 50MB 초과로 제외됨`); return null; }
  const path=`${Store.uid()}_${f.name.replace(/[^\w.\-]/g,"_")}`;
  const {error}=await sb.storage.from(BUCKET).upload(path,f,{upsert:false,contentType:f.type||undefined});
  if(error){ console.error(error); toast(`${f.name} 업로드 실패: ${error.message.slice(0,40)}`); return null; }
  const out={fileData:publicUrl(path),fileName:f.name,fileMime:f.type,filePath:path,link:"",body:"",thumbPath:null,thumbData:null};
  if(ASSET_THUMB_OK && (f.type||"").startsWith("image/")){
    try{ const thumb=await makeWebpThumb(f);
      if(thumb){ const tp=`${Store.uid()}_${thumb.name.replace(/[^\w.\-]/g,"_")}`;
        const {error:te}=await sb.storage.from(BUCKET).upload(tp,thumb,{upsert:false,contentType:thumb.type});
        if(!te){ out.thumbPath=tp; out.thumbData=publicUrl(tp); } else console.warn("썸네일 업로드 실패:",te.message); }
    }catch(e){ console.warn("썸네일 처리 실패:",e); }
  }
  return out;
}

        const cover=imgs[0];                                   // 업로드 순서 그대로, 첫 장이 대표
        const pages=imgs.map(x=>({filePath:x.filePath,fileName:x.fileName,fileMime:x.fileMime,thumbPath:x.thumbPath||null,fileData:x.fileData,thumbData:x.thumbData||null}));
        const a={id:Store.uid(),taskId,type,authorId:me().id,ver:1,link:"",body:"",filePath:cover.filePath,fileName:cover.fileName,fileMime:cover.fileMime,fileData:cover.fileData,thumbPath:cover.thumbPath||null,thumbData:cover.thumbData||null,pages,note,keywords:kw,checks:null,createdAt:Date.now()};
        if(await Store.addAsset(a)){ added.push(a); await mkVer(a); }
      }
      for(const att of others){
        const a={id:Store.uid(),taskId,type:"content",authorId:me().id,ver:1,...att,body:att.body||"",note,keywords:kw,checks:null,createdAt:Date.now()};
        if(await Store.addAsset(a)){ added.push(a); await mkVer(a); }
      }
    } else {
      for(const att of atts){
        const a={id:Store.uid(),taskId,type,authorId:me().id,ver:1,...att,body:att.body||"",note,keywords:kw,checks:null,createdAt:Date.now()};
        if(ph) a.phases=ph;
        if(await Store.addAsset(a)){ added.push(a); await mkVer(a); }
      }
    }
    if(!added.length){ console.error("[asset insert] all failed"); return false; }
    Store.log(me().id,taskId,"asset",`산출물 ${added.length}건을 등록했습니다`);
    toast(`${added.length}건 등록 완료 — AI 검사 중`); render();
    for(const a of added){ try{ const checks=await AiService.checks(a,t,Store.brand(t.brandId)); await Store.update("assets",a.id,{checks},()=>{a.checks=checks;}); }catch(e){ console.error("checks 실패:",e); } }
    Store.log(me().id,taskId,"ai","AI 업로드 검사 완료"); render();
  }});
  wireAssetForm();
}

          if(a.body) patch.body=null;
          applyExtra=()=>{ a.filePath=r.filePath; a.fileName=r.fileName; a.fileMime=r.fileMime; a.fileData=r.fileData; a.thumbPath=r.thumbPath; a.thumbData=r.thumbData; a.link=""; a.body=""; };

function openBulkReplaceModal(taskId){
  const imgs=Store.assetsOf(taskId).filter(a=>(a.fileMime||"").startsWith("image/"));
  if(!imgs.length){ toast("교체할 이미지 산출물이 없습니다"); return; }
  const rows=imgs.map(a=>`
    <div class="brep-row">
      <img src="${a.thumbData||a.fileData}" class="brep-thumb" alt="" loading="lazy">
      <div class="brep-info"><div class="brep-name">${esc(a.note||a.fileName||"이미지")}</div><div class="hint">${esc(a.fileName||"")} · v${a.ver}</div>
        <input type="file" accept="image/*" data-aid="${a.id}" style="margin-top:6px"></div>
    </div>`).join("");
  Modal.open({title:"이미지 일괄 교체",okLabel:"교체 저장",wide:true,body:`
    <p class="hint" style="margin-top:0">교체할 이미지에만 새 파일을 선택하세요. 선택하지 않은 항목은 그대로 유지됩니다. (이미지 ↔ 이미지, 한 번에 일괄 교체)</p>
    <div id="bulkrep" class="brep-list">${rows}</div>`,
    submit:async()=>{
      const inputs=[...document.querySelectorAll('#bulkrep input[type=file]')];
      const picked=inputs.filter(i=>i.files&&i.files[0]);
      if(!picked.length){ toast("교체할 파일을 선택하세요"); return false; }
      let count=0;
      for(const inp of picked){
        const f=inp.files[0];
        if(!(f.type||"").startsWith("image/")){ toast(`${f.name}: 이미지 파일만 가능`); continue; }
        const a=Store.db.assets.find(x=>x.id===inp.dataset.aid); if(!a) continue;
        const r=await uploadOne(f); if(!r) continue;
        const oldPath=a.filePath, oldThumb=a.thumbPath, newVer=(a.ver||1)+1;
        const patch={ver:newVer,file_path:r.filePath,file_name:r.fileName,file_mime:r.fileMime};
        if(r.thumbPath) patch.thumb_path=r.thumbPath; else if(a.thumbPath) patch.thumb_path=null;
        const ok=await Store.update("assets",a.id,patch,
          ()=>{ a.ver=newVer; a.filePath=r.filePath; a.fileName=r.fileName; a.fileMime=r.fileMime; a.fileData=r.fileData; a.thumbPath=r.thumbPath; a.thumbData=r.thumbData; });
        if(ok){ count++;
          await Store.addVersion({id:Store.uid(),assetId:a.id,no:newVer,changes:"이미지 교체",reason:"일괄 교체",editorId:me().id,createdAt:Date.now()});
          const rm=[]; if(oldPath&&oldPath!==r.filePath)rm.push(oldPath); if(oldThumb&&oldThumb!==r.thumbPath)rm.push(oldThumb);
          if(rm.length){ try{ await sb.storage.from(BUCKET).remove(rm); }catch(e){} }
        }
      }
      if(!count){ toast("교체에 실패했습니다 — 다시 시도하세요"); return false; }
      Store.log(me().id,taskId,"version",`이미지 ${count}건을 일괄 교체했습니다`);
      toast(`${count}건 교체 완료`); render();
    }});
}

function ganttWindow(g){
  g=g||session.gantt; const day=86400000;
  const sod=ts=>{const d=new Date(ts);d.setHours(0,0,0,0);return d.getTime();};
  const anchor = g.anchor!=null ? g.anchor : Date.now();
  if(g.range==="week"){ const dow=(new Date(anchor).getDay()+6)%7; const start=sod(anchor)-dow*day; return {start,end:start+7*day,range:"week",ticks:"day"}; }
  if(g.range==="month"){ const d=new Date(anchor); return {start:new Date(d.getFullYear(),d.getMonth(),1).getTime(),end:new Date(d.getFullYear(),d.getMonth()+1,1).getTime(),range:"month",ticks:"week"}; }
  if(g.range==="quarter"){ const d=new Date(anchor); const qm=Math.floor(d.getMonth()/3)*3; return {start:new Date(d.getFullYear(),qm,1).getTime(),end:new Date(d.getFullYear(),qm+3,1).getTime(),range:"quarter",ticks:"month"}; }
  return null; // all
}
function ganttTicks(win){
  if(!win) return []; const day=86400000, span=win.end-win.start, out=[]; const pct=ts=>((ts-win.start)/span)*100;
  if(win.ticks==="day"){ for(let t=win.start;t<win.end;t+=day){ const d=new Date(t); out.push({pct:pct(t),label:`${d.getMonth()+1}/${d.getDate()}`}); } }
  else if(win.ticks==="week"){ for(let t=win.start;t<win.end;t+=7*day){ const d=new Date(t); out.push({pct:pct(t),label:`${d.getMonth()+1}/${d.getDate()}`}); } }
  else { let d=new Date(win.start); while(d.getTime()<win.end){ out.push({pct:pct(d.getTime()),label:`${String(d.getFullYear()).slice(2)}.${String(d.getMonth()+1).padStart(2,"0")}`}); d=new Date(d.getFullYear(),d.getMonth()+1,1); } }
  return out;
}
function ganttLabel(win,g){
  g=g||session.gantt; if(!win) return "전체 기간";
  const s=new Date(win.start);
  if(g.range==="week"){ const e=new Date(win.end-86400000); return `${s.getMonth()+1}.${String(s.getDate()).padStart(2,"0")} ~ ${e.getMonth()+1}.${String(e.getDate()).padStart(2,"0")}`; }
  if(g.range==="month") return `${s.getFullYear()}.${String(s.getMonth()+1).padStart(2,"0")}`;
  return `${s.getFullYear()} ${Math.floor(s.getMonth()/3)+1}분기`;
}
function ganttShift(dir,g){
  g=g||session.gantt; if(g.range==="all") return; const day=86400000;
  const a=new Date(g.anchor!=null?g.anchor:Date.now());
  if(g.range==="week") g.anchor=(g.anchor!=null?g.anchor:Date.now())+dir*7*day;
  else if(g.range==="month") g.anchor=new Date(a.getFullYear(),a.getMonth()+dir,1).getTime();
  else if(g.range==="quarter") g.anchor=new Date(a.getFullYear(),a.getMonth()+dir*3,1).getTime();
}
function viewGantt(){
  const day=86400000;
  const sod=ts=>{const d=new Date(ts);d.setHours(0,0,0,0);return d.getTime();};
  const today=sod(Date.now());
  const isMgr=me().role==="manager";

  const lvUsers=(me().role==="manager"||me().role==="executive")

    : Store.db.users.filter(u=>u.id===me().id&&u.hireDate);

    <div class="card-b" style="overflow-x:auto"><table class="ctab"><thead><tr><th>이름</th><th>입사일</th><th class="num">적립</th><th class="num">사용</th><th class="num">잔여</th><th class="num">예정</th>${isMgrLv?"<th></th>":""}</tr></thead><tbody>
    ${lvUsers.map(u=>{const s=leaveSummary(u,new Date());return `<tr>
      <td>${esc(u.name)}${u.id===me().id?' <span class="tag">나</span>':''}</td>
      <td style="white-space:nowrap">${u.hireDate?mdisp(u.hireDate):"-"}</td>
      <td class="num">${s.accrued}${s.adjust?`<span class="hint"> ${s.adjust>0?"+":""}${s.adjust}</span>`:""}</td>
      <td class="num">${s.used}</td>
      <td class="num" style="font-weight:800;color:${s.remain>0?"var(--ok)":s.remain<0?"var(--warn)":"var(--muted)"}">${s.remain}일</td>
      <td class="num">${s.upcoming?`<span style="color:var(--vac)">${s.upcoming}일</span>`:"-"}</td>
      ${isMgrLv?`<td class="num"><button class="btn btn-ghost btn-sm" data-act="leave-edit" data-id="${u.id}" style="padding:2px 8px;font-size:11px">설정</button></td>`:""}
    </tr>`;}).join("")}
    </tbody></table>
    <div class="hint" style="margin-top:8px">잔여 = 적립 + 조정 − 사용(완료 휴가의 평일 수). ‘예정’은 아직 차감되지 않은 앞으로의 휴가입니다.</div></div></div>`:"";

  // ---- 월 달력 ----
  const now=new Date();
  let cm=session.calMonth || `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const [cy,cmo]=cm.split("-").map(Number);
  const monthStart=new Date(cy,cmo-1,1);
  const daysInMonth=new Date(cy,cmo,0).getDate();
  const firstWd=monthStart.getDay();               // 0=일
  const gridStart=sod(new Date(cy,cmo-1,1-firstWd));
  const weeks=Math.ceil((firstWd+daysInMonth)/7);
  const WD=["일","월","화","수","목","금","토"];

  // 이벤트 목록(업무+휴가)
  const events=[];
  all.forEach(t=>{ const s=sod(t.start||t.createdAt), e=sod(t.due);
    const ownerName=Store.user(t.ownerId)?.name||"";
    events.push({kind:"task",id:t.id,s,e:Math.max(e,s),label:t.title,colorHex:assigneeColor(ownerName),sub:ownerName}); });
  vacs.forEach(v=>{ const s=sod(vmts(v.start)),e=sod(vmts(v.end));
    events.push({kind:"vac",id:v.id,s,e:Math.max(e,s),label:(Store.user(v.userId)?.name||"휴가"),color:"--vac",sub:"휴가"}); });

  // 상단 범례: 등록된 담당자 + 이번 달 캘린더에 나타난 담당자 모두 표시
  const legendNames = [];
  Object.keys(ASSIGNEE_COLORS).forEach(n=>{ if(!legendNames.includes(n)) legendNames.push(n); });
  events.forEach(ev=>{ if(ev.kind==="task" && ev.sub && !legendNames.includes(ev.sub)) legendNames.push(ev.sub); });
  const legendHtml = legendNames.map(n=>`<span><i style="background:${assigneeColor(n)}"></i>${esc(n)}</span>`).join("")
    + `<span><i style="background:var(--vac)"></i>휴가</span>`;

  const toolbar=`<div class="cal-toolbar">
    <span class="cal-nav"><button class="btn btn-ghost btn-sm" data-act="cal-nav" data-dir="-1">‹</button>
      <b style="min-width:120px;text-align:center;display:inline-block">${cy}년 ${cmo}월</b>
      <button class="btn btn-ghost btn-sm" data-act="cal-nav" data-dir="1">›</button>
      <button class="btn btn-ghost btn-sm" data-act="cal-today" style="margin-left:6px">오늘</button></span>
    <span class="cal-legend">${legendHtml}</span>
    <span style="flex:1"></span>${VAC_OK?`<button class="btn btn-ghost btn-sm" data-act="vac-add">🏖 + 휴가 생성</button>`:""}
  </div>`;

  let weeksHtml="";
  for(let w=0; w<weeks; w++){
    const weekStart=gridStart + w*7*day;
    const weekEnd=weekStart + 7*day;
    // 이번 주 이벤트 → 세그먼트(col start/end) + 레인 배치
    const segs=events.filter(ev=>ev.e>=weekStart && ev.s<weekEnd).map(ev=>{
      const cs=Math.max(0, Math.floor((ev.s-weekStart)/day));
      const ce=Math.min(6, Math.floor((ev.e-weekStart)/day));
      return {...ev,cs,ce};
    }).sort((a,b)=>a.cs-b.cs || (b.ce-b.cs)-(a.ce-a.cs));
    const lanes=[]; // 각 레인의 마지막 점유 col
    segs.forEach(sg=>{ let placed=-1;
      for(let i=0;i<lanes.length;i++){ if(lanes[i]<sg.cs){ placed=i; break; } }
      if(placed<0){ placed=lanes.length; lanes.push(sg.ce); } else lanes[placed]=sg.ce;
      sg.lane=placed;
    });
    const laneCount=Math.max(1,lanes.length);
    const rowH=24 + laneCount*20 + 6;
    // 날짜 셀 배경
    let cells="";
    for(let d=0; d<7; d++){
      const ts=weekStart + d*day; const dt=new Date(ts);
      const inMonth=dt.getMonth()===cmo-1;
      const isToday=ts===today; const wd=dt.getDay();
      const numColor= isToday?"#fff": !inMonth?"var(--muted)": wd===0?"var(--warn)": wd===6?"var(--s-prod)":"var(--ink)";
      cells+=`<div class="cal-cell${inMonth?"":" out"}" style="left:${d/7*100}%;width:${100/7}%">
        <span class="cal-num" style="color:${numColor};${isToday?"background:var(--primary);":""}">${dt.getDate()}</span>
      </div>`;
    }
    // 이벤트 막대
    let bars="";
    segs.forEach(sg=>{
      const left=sg.cs/7*100, width=(sg.ce-sg.cs+1)/7*100;
      const top=24 + sg.lane*20;
      const clickable=sg.kind==="task"?`data-act="open-task" data-id="${sg.id}"`:"";
      const contBadge = sg.s<weekStart?"‹ ":""; const contAfter = sg.e>=weekEnd?" ›":"";
      const barBg = sg.colorHex ? sg.colorHex : `var(${sg.color})`;
      bars+=`<div class="cal-bar" ${clickable} title="${esc(sg.label)}${sg.sub?" · "+esc(sg.sub):""}" style="left:calc(${left}% + 3px);width:calc(${width}% - 6px);top:${top}px;background:${barBg}">${contBadge}${sg.kind==="vac"?"🏖 ":""}${esc(sg.label)}${contAfter}</div>`;
    });
    weeksHtml+=`<div class="cal-week" style="height:${rowH}px">${cells}${bars}</div>`;
  }
  const calendar=`<div class="card"><div class="card-b">
    ${toolbar}
    <div class="cal-grid">
      <div class="cal-head">${WD.map((d,i)=>`<div style="color:${i===0?'var(--warn)':i===6?'var(--s-prod)':'var(--ink-soft)'}">${d}</div>`).join("")}</div>
      ${weeksHtml}
    </div>
    <div class="hint" style="margin-top:10px">확정 업무(팀장 검토 완료 이상)와 팀 휴가를 표시합니다. 막대 색은 담당자별로 구분되며, 업무 막대를 누르면 상세로 이동합니다.</div>
  </div></div>`;

  return `${ph("일정","팀 업무 일정과 휴가를 월 달력으로 봅니다.")}${leaveCard}${calendar}`;
}

function adSvgLine(series,axisFmt){
  const W=720,H=240,padL=58,padR=16,padT=14,padB=32;
  if(!series.length) return `<div class="hint" style="padding:30px 0;text-align:center">표시할 추세 데이터가 없습니다. (날짜 열이 매핑된 데이터가 필요합니다)</div>`;
  const vals=series.map(s=>s.value); let max=Math.max(...vals,0),min=Math.min(...vals,0);
  if(max===min){ max=max||1; min=Math.min(0,min); }
  const iw=W-padL-padR,ih=H-padT-padB,n=series.length;
  const x=i=>padL+(n===1?iw/2:iw*i/(n-1)), y=v=>padT+ih*(1-(v-min)/(max-min));
  const pts=series.map((s,i)=>`${x(i).toFixed(1)},${y(s.value).toFixed(1)}`).join(" ");
  let grid="";
  for(let g=0;g<=4;g++){ const gv=min+(max-min)*g/4,gy=y(gv);
    grid+=`<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="var(--line)"/><text x="${padL-8}" y="${(gy+4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--muted)">${axisFmt(gv)}</text>`; }
  const area=`${x(0).toFixed(1)},${y(min).toFixed(1)} ${pts} ${x(n-1).toFixed(1)},${y(min).toFixed(1)}`;
  const step=Math.max(1,Math.ceil(n/6)); let xl="";
  series.forEach((s,i)=>{ if(i%step===0||i===n-1) xl+=`<text x="${x(i).toFixed(1)}" y="${H-10}" text-anchor="middle" font-size="10" fill="var(--muted)">${esc(s.label.slice(5))}</text>`; });
  const dots=series.map((s,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(s.value).toFixed(1)}" r="${n>45?0:2.6}" fill="var(--primary)"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">${grid}<polygon points="${area}" fill="var(--primary-soft)" opacity=".5"/><polyline points="${pts}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}${xl}</svg>`;
}

function contentAgg(rows){ const M=["views","reach","likes","shares","follows","comments","saves"]; const o={}; M.forEach(k=>o[k]=rows.reduce((s,r)=>s+(r[k]||0),0)); o.count=rows.length; return o; }
/* ---- 연차(잔여 휴가) 계산 ---- */
const LV_dparse=d=>{ if(!d) return null; const p=String(d).split("-").map(Number); return p.length===3?new Date(p[0],p[1]-1,p[2]):null; };
const LV_sod=dt=>{ const d=new Date(dt); d.setHours(0,0,0,0); return d; };
// 적립: 입사 다음 달 입사일부터 매월 입사일에 +1 (asOf 날짜까지 누적)
function leaveAccrued(hireDate, asOf){
  const h=LV_dparse(hireDate); if(!h) return 0;
  const today=LV_sod(asOf||new Date());
  let y=h.getFullYear(), m=h.getMonth()+1, hd=h.getDate(), n=0;
  m+=1; if(m>12){m=1;y++;}
  for(let guard=0; guard<600; guard++){
    const lastDay=new Date(y,m,0).getDate();
    const day=Math.min(hd,lastDay);
    const d=LV_sod(new Date(y,m-1,day));
    if(d<=today){ n++; m++; if(m>12){m=1;y++;} } else break;
  }
  return n;
}
// 평일 수(주말 제외), 시작~종료 포함
function weekdaysBetween(startStr,endStr){
  const s=LV_dparse(startStr), e=LV_dparse(endStr); if(!s||!e) return 0;
  let cnt=0; const cur=new Date(s);
  while(cur<=e){ const wd=cur.getDay(); if(wd!==0&&wd!==6) cnt++; cur.setDate(cur.getDate()+1); }
  return cnt;
}
// 사용(완료=종료일이 지난 휴가)의 평일 합 / 예정(오늘 이후 종료)의 평일 합
function leaveUsage(userId, asOf){
  const today=LV_sod(asOf||new Date());
  let used=0, upcoming=0;
  (Store.db.vacations||[]).filter(v=>v.userId===userId).forEach(v=>{
    const wd=weekdaysBetween(v.start,v.end);
    const end=LV_dparse(v.end);
    if(end && LV_sod(end)<today) used+=wd; else upcoming+=wd;
  });
  return {used, upcoming};
}
// 종합: {accrued, adjust, used, upcoming, remain}
function leaveSummary(user, asOf){
  const accrued=leaveAccrued(user.hireDate, asOf);
  const adjust=+user.leaveAdjust||0;
  const {used, upcoming}=leaveUsage(user.id, asOf);
  const remain=accrued+adjust-used;
  return {accrued, adjust, used, upcoming, remain};
}

function loadExcelJS(){ return new Promise((res,rej)=>{ if(window.ExcelJS)return res(window.ExcelJS);
